<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero for `macd-vs-rsi`. Comparison layout: title row on top, then a
  side-by-side split showing the two indicators' anatomy — MACD's
  zero-axis HIST + cross on the left, RSI's 0-100 with 70/30 thresholds
  on the right — with the dividing column listing the "different
  regimes" point.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top eyebrow + title -->
  <text x="60" y="80" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">COMPARISON · TWO INDICATORS, TWO REGIMES</text>
  <text x="60" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="65" font-weight="600" fill="#F4F4F5" letter-spacing="-1">MACD vs RSI</text>
  <text x="60" y="200" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#F4F4F5" opacity="0.55">Different math. Different failure modes. Use both, weighted by regime.</text>

  <!-- LEFT panel: MACD anatomy -->
  <g transform="translate(60,260)">
    <rect x="0" y="0" width="540" height="320" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.2"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#f59e0b" letter-spacing="2">MACD · TREND MOMENTUM</text>
    <text x="22" y="62" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" font-weight="600">Zero-axis · unbounded · trend-friendly</text>

    <!-- Mini MACD lower-pane chart -->
    <g transform="translate(22,90)">
      <!-- Zero axis -->
      <line x1="0" y1="100" x2="486" y2="100" stroke="#F4F4F5" stroke-opacity="0.3"/>
      <text x="-8" y="104" font-family="ui-monospace, monospace" font-size="10" fill="#F4F4F5" opacity="0.5" text-anchor="end">0</text>
      <!-- HIST bars -->
      <rect x="6"   y="100" width="12" height="22" fill="#22c55e" opacity="0.85"/>
      <rect x="24"  y="100" width="12" height="14" fill="#22c55e" opacity="0.85"/>
      <rect x="42"  y="100" width="12" height="8"  fill="#22c55e" opacity="0.85"/>
      <rect x="60"  y="96"  width="12" height="4"  fill="#ef4444" opacity="0.85"/>
      <rect x="78"  y="86"  width="12" height="14" fill="#ef4444" opacity="0.85"/>
      <rect x="96"  y="72"  width="12" height="28" fill="#ef4444" opacity="0.85"/>
      <rect x="114" y="58"  width="12" height="42" fill="#ef4444" opacity="0.85"/>
      <rect x="132" y="46"  width="12" height="54" fill="#ef4444" opacity="0.85"/>
      <rect x="150" y="36"  width="12" height="64" fill="#ef4444" opacity="0.85"/>
      <rect x="168" y="32"  width="12" height="68" fill="#ef4444" opacity="0.85"/>
      <rect x="186" y="36"  width="12" height="64" fill="#ef4444" opacity="0.85"/>
      <rect x="204" y="46"  width="12" height="54" fill="#ef4444" opacity="0.85"/>
      <rect x="222" y="60"  width="12" height="40" fill="#ef4444" opacity="0.85"/>
      <rect x="240" y="76"  width="12" height="24" fill="#ef4444" opacity="0.85"/>
      <rect x="258" y="92"  width="12" height="8"  fill="#ef4444" opacity="0.85"/>
      <rect x="276" y="100" width="12" height="6"  fill="#22c55e" opacity="0.85"/>
      <rect x="294" y="100" width="12" height="14" fill="#22c55e" opacity="0.85"/>
      <rect x="312" y="100" width="12" height="22" fill="#22c55e" opacity="0.85"/>
      <rect x="330" y="100" width="12" height="30" fill="#22c55e" opacity="0.85"/>
      <rect x="348" y="100" width="12" height="36" fill="#22c55e" opacity="0.85"/>
      <rect x="366" y="100" width="12" height="32" fill="#22c55e" opacity="0.85"/>
      <rect x="384" y="100" width="12" height="22" fill="#22c55e" opacity="0.85"/>
      <rect x="402" y="100" width="12" height="14" fill="#22c55e" opacity="0.85"/>
      <!-- DIF line -->
      <path d="M 12 122 L 30 116 L 48 108 L 66 96 L 84 84 L 102 70 L 120 56 L 138 44 L 156 36 L 174 32 L 192 38 L 210 50 L 228 66 L 246 84 L 264 102 L 282 118 L 300 130 L 318 138 L 336 142 L 354 140 L 372 132 L 390 122"
            fill="none" stroke="#f59e0b" stroke-width="2"/>
      <!-- DEA line -->
      <path d="M 12 116 L 30 112 L 48 106 L 66 98 L 84 90 L 102 80 L 120 70 L 138 60 L 156 52 L 174 48 L 192 50 L 210 58 L 228 70 L 246 84 L 264 100 L 282 114 L 300 124 L 318 132 L 336 134 L 354 134 L 372 130 L 390 124"
            fill="none" stroke="#3b82f6" stroke-width="2"/>
    </g>
    <text x="22" y="246" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.65">★ Best in: trending markets (ADX &gt; 25)</text>
    <text x="22" y="270" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.65">✗ Whipsaws in: range-bound chop</text>
    <text x="22" y="294" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.5" font-style="italic">Signal: DIF/DEA cross + HIST direction</text>
  </g>

  <!-- RIGHT panel: RSI anatomy -->
  <g transform="translate(620,260)">
    <rect x="0" y="0" width="520" height="320" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.2"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#a78bfa" letter-spacing="2">RSI · MEAN REVERSION</text>
    <text x="22" y="62" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" font-weight="600">Bounded 0–100 · saturates in trends</text>

    <!-- Mini RSI chart -->
    <g transform="translate(22,90)">
      <!-- 70 line -->
      <line x1="0" y1="20" x2="466" y2="20" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
      <text x="-8" y="24" font-family="ui-monospace, monospace" font-size="10" fill="#ef4444" opacity="0.7" text-anchor="end">70</text>
      <!-- 50 mid -->
      <line x1="0" y1="80" x2="466" y2="80" stroke="#F4F4F5" stroke-width="1" stroke-dasharray="2 2" opacity="0.2"/>
      <text x="-8" y="84" font-family="ui-monospace, monospace" font-size="10" fill="#F4F4F5" opacity="0.4" text-anchor="end">50</text>
      <!-- 30 line -->
      <line x1="0" y1="140" x2="466" y2="140" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
      <text x="-8" y="144" font-family="ui-monospace, monospace" font-size="10" fill="#22c55e" opacity="0.7" text-anchor="end">30</text>

      <!-- RSI line — oscillates between 30 and 70 (range-bound regime) -->
      <path d="M 5 130 L 25 110 L 45 80 L 65 50 L 85 30 L 105 25 L 125 40 L 145 65 L 165 95 L 185 125 L 205 140 L 225 130 L 245 100 L 265 70 L 285 40 L 305 28 L 325 35 L 345 65 L 365 100 L 385 130 L 405 140 L 425 125 L 445 95 L 460 70"
            fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    </g>
    <text x="22" y="246" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.65">★ Best in: range-bound markets (ADX &lt; 20)</text>
    <text x="22" y="270" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.65">✗ Saturates in: strong trends</text>
    <text x="22" y="294" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.5" font-style="italic">Signal: 70/30 threshold + divergence</text>
  </g>
</svg>
