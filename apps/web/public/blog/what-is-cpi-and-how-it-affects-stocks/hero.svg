<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">MACRO · INFLATION</text>

  <text x="60" y="220" font-family="Georgia, serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">CPI</text>

  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Consumer Price Index</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Markets move on the *surprise*,</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">not the absolute level.</text>

  <g transform="translate(60,400)">
    <rect x="0" y="0" width="560" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">THE TRANSMISSION CHAIN</text>
    <text x="22" y="64" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">1. CPI vs consensus →</text>
    <text x="22" y="86" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">2. Fed expectations revise →</text>
    <text x="22" y="108" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">3. Treasury yields move →</text>
    <text x="22" y="130" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">4. Discount rates adjust → 5. Equities move</text>
  </g>

  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">SECTOR DISPERSION ON HOT CPI</text>

    <!-- Center axis -->
    <line x1="230" y1="0" x2="230" y2="330" stroke="#F4F4F5" stroke-opacity="0.25"/>
    <text x="230" y="-6" font-family="ui-monospace, monospace" font-size="10" fill="#F4F4F5" opacity="0.5" text-anchor="middle">0</text>

    <!-- Long-duration tech: big negative -->
    <text x="220" y="22" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85" text-anchor="end">SaaS / biotech</text>
    <rect x="80" y="10" width="150" height="20" fill="#ef4444" opacity="0.85"/>
    <text x="76" y="25" font-family="ui-monospace, monospace" font-size="11" fill="#ef4444" text-anchor="end" font-weight="600">−3.5%</text>

    <!-- Mega-cap tech -->
    <text x="220" y="58" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85" text-anchor="end">Mega-cap tech</text>
    <rect x="155" y="46" width="75" height="20" fill="#ef4444" opacity="0.65"/>

    <!-- Utilities / REITs -->
    <text x="220" y="94" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85" text-anchor="end">Utilities · REITs</text>
    <rect x="105" y="82" width="125" height="20" fill="#ef4444" opacity="0.8"/>

    <!-- Discretionary -->
    <text x="220" y="130" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85" text-anchor="end">Discretionary</text>
    <rect x="155" y="118" width="75" height="20" fill="#ef4444" opacity="0.6"/>

    <!-- Staples (modest -) -->
    <text x="220" y="166" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85" text-anchor="end">Staples</text>
    <rect x="200" y="154" width="30" height="20" fill="#ef4444" opacity="0.4"/>

    <!-- Financials -->
    <text x="240" y="202" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">Financials</text>
    <rect x="230" y="190" width="50" height="20" fill="#4FCBA8" opacity="0.5"/>

    <!-- Energy -->
    <text x="240" y="238" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">Energy / materials</text>
    <rect x="230" y="226" width="120" height="20" fill="#4FCBA8" opacity="0.85"/>
    <text x="354" y="241" font-family="ui-monospace, monospace" font-size="11" fill="#4FCBA8" font-weight="600">+2.8%</text>

    <g transform="translate(0,290)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">Long-duration cash flows discounted at higher</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">rate — present value falls disproportionately.</text>
    </g>
  </g>
</svg>
