<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · VALUATION</text>

  <text x="60" y="220" font-family="Georgia, serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">P/B</text>

  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Price-to-Book Ratio</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Works for banks. Fails for software.</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Know which side of the line you're on.</text>

  <g transform="translate(60,400)">
    <rect x="0" y="0" width="560" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="68" font-family="ui-monospace, monospace" font-size="20" fill="#F4F4F5">P/B = Market Cap / Book Equity</text>
    <text x="22" y="98" font-family="ui-monospace, monospace" font-size="16" fill="#F4F4F5">    = Price / Book Value per Share</text>
    <text x="22" y="130" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">&lt; 1.0 = market below book · check why before "bargain"</text>
  </g>

  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">WHERE DOES BUSINESS VALUE SIT?</text>

    <!-- Bank: most on balance sheet -->
    <g transform="translate(0,20)">
      <text x="0" y="14" font-family="ui-monospace, monospace" font-size="12" fill="#4FCBA8" font-weight="600">BANK</text>
      <rect x="80" y="0" width="320" height="22" fill="#4FCBA8" opacity="0.85"/>
      <rect x="400" y="0" width="40" height="22" fill="#60a5fa" opacity="0.4"/>
      <text x="450" y="16" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">P/B works</text>
    </g>
    <!-- Manufacturer: some on, some off -->
    <g transform="translate(0,52)">
      <text x="0" y="14" font-family="ui-monospace, monospace" font-size="12" fill="#f59e0b" font-weight="600">MFG</text>
      <rect x="80" y="0" width="200" height="22" fill="#4FCBA8" opacity="0.85"/>
      <rect x="280" y="0" width="160" height="22" fill="#60a5fa" opacity="0.4"/>
      <text x="450" y="16" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.55">moderate</text>
    </g>
    <!-- Software: mostly off -->
    <g transform="translate(0,84)">
      <text x="0" y="14" font-family="ui-monospace, monospace" font-size="12" fill="#ef4444" font-weight="600">SW</text>
      <rect x="80" y="0" width="40" height="22" fill="#4FCBA8" opacity="0.85"/>
      <rect x="120" y="0" width="320" height="22" fill="#60a5fa" opacity="0.4"/>
      <text x="450" y="16" font-family="ui-monospace, monospace" font-size="11" fill="#ef4444" opacity="0.85">P/B fails</text>
    </g>

    <!-- Legend -->
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="14" height="14" fill="#4FCBA8" opacity="0.85"/>
      <text x="22" y="11" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">on balance sheet</text>
      <rect x="180" y="0" width="14" height="14" fill="#60a5fa" opacity="0.4"/>
      <text x="202" y="11" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">intangibles (off)</text>
    </g>

    <g transform="translate(0,200)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">For software, brand, biotech — book value</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">captures almost none of the real economic value.</text>
      <text x="0" y="48" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">Switch to P/E, EV/EBITDA, or DCF.</text>
    </g>
  </g>
</svg>
