<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · INCOME</text>

  <text x="60" y="220" font-family="Georgia, serif" font-size="84" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Dividend Yield</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Looks simple. Isn't.</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">A high yield is usually the market</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">predicting a future dividend cut.</text>

  <g transform="translate(60,400)">
    <rect x="0" y="0" width="580" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA + DURABILITY CHECK</text>
    <text x="22" y="66" font-family="ui-monospace, monospace" font-size="18" fill="#F4F4F5">Yield = Annual Div / Price</text>
    <text x="22" y="96" font-family="ui-monospace, monospace" font-size="16" fill="#F4F4F5">Payout = Div / FCF — &lt; 60% safe, &gt; 80% fragile</text>
    <text x="22" y="126" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">Trailing vs forward · sub-6% normal · &gt; 6% = warning</text>
  </g>

  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">THE DIVIDEND TRAP</text>

    <!-- Stage 1 -->
    <g transform="translate(0,20)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.55" letter-spacing="2">PRE-TROUBLE</text>
      <text x="0" y="28" font-family="Georgia, serif" font-size="28" fill="#F4F4F5" font-weight="600">$100</text>
      <text x="80" y="20" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.7">price · $5 div</text>
      <text x="80" y="38" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" font-weight="600">5.0% yield</text>
    </g>

    <!-- Arrow -->
    <text x="0" y="92" font-family="ui-monospace, monospace" font-size="14" fill="#F4F4F5" opacity="0.4">↓ concern</text>

    <!-- Stage 2 -->
    <g transform="translate(0,108)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="11" fill="#ef4444" opacity="0.85" letter-spacing="2">CONCERN PHASE</text>
      <text x="0" y="28" font-family="Georgia, serif" font-size="28" fill="#ef4444" font-weight="600">$60</text>
      <text x="80" y="20" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.7">price · $5 div</text>
      <text x="80" y="38" font-family="ui-monospace, monospace" font-size="14" fill="#ef4444" font-weight="600">8.3% yield</text>
      <text x="180" y="38" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.5">looks attractive!</text>
    </g>

    <text x="0" y="180" font-family="ui-monospace, monospace" font-size="14" fill="#F4F4F5" opacity="0.4">↓ cut</text>

    <!-- Stage 3 -->
    <g transform="translate(0,196)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="11" fill="#ef4444" opacity="0.85" letter-spacing="2">CUT ANNOUNCED</text>
      <text x="0" y="28" font-family="Georgia, serif" font-size="28" fill="#ef4444" font-weight="600">$40</text>
      <text x="80" y="20" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.7">price · $2.50 div</text>
      <text x="80" y="38" font-family="ui-monospace, monospace" font-size="14" fill="#ef4444" font-weight="600">6.3% yield</text>
      <text x="180" y="38" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ef4444" opacity="0.7">33% capital loss</text>
    </g>

    <g transform="translate(0,290)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">Check payout ratio on FCF — not yield alone.</text>
    </g>
  </g>
</svg>
