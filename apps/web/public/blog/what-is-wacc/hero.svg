<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-wacc`. Left column: title + formula.
  Right column: a horizontal "weighted stack" showing equity vs debt
  by share of total capital, with each side labelled by its cost
  contribution. A bottom result row shows the example WACC math
  resolving to a single number. Fonts use OS-standard families so
  sharp/librsvg rasterisation produces a clean PNG.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waccBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="waccGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#waccBg)"/>

  <!-- Eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · COST OF CAPITAL</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">WACC</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Weighted Average Cost of Capital</text>

  <!-- Tagline -->
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">The discount rate that quietly</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">decides every valuation.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="520" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="76" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">WACC = (E/V) · R<tspan font-size="14" dy="6">e</tspan></text>
    <text x="100" y="104" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">+ (D/V) · R<tspan font-size="14" dy="6">d</tspan><tspan dy="-6" font-size="22"> · (1 − t)</tspan></text>
  </g>

  <!-- Right column: weighted-stack visualisation -->
  <g transform="translate(680,160)">
    <!-- Capital structure stack: a single horizontal bar, equity (left ~70%) + debt (right ~30%) -->
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">CAPITAL STRUCTURE</text>

    <!-- Equity segment -->
    <rect x="0" y="20" width="350" height="56" rx="6" fill="#4FCBA8"/>
    <text x="20" y="58" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#14120b">Equity</text>
    <text x="330" y="58" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="700" fill="#14120b" text-anchor="end">70%</text>

    <!-- Debt segment -->
    <rect x="354" y="20" width="156" height="56" rx="6" fill="#2D7E6E"/>
    <text x="370" y="58" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#F4F4F5">Debt</text>
    <text x="498" y="58" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="700" fill="#F4F4F5" text-anchor="end">30%</text>

    <!-- "E/V" + "D/V" callouts under the bar -->
    <text x="175" y="100" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.65" text-anchor="middle">E / V</text>
    <text x="432" y="100" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.65" text-anchor="middle">D / V</text>

    <!-- Cost rows -->
    <text x="0" y="150" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">COST OF EACH SOURCE</text>

    <!-- Equity cost row -->
    <g transform="translate(0,170)">
      <circle cx="14" cy="14" r="8" fill="#4FCBA8"/>
      <text x="40" y="20" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5">Cost of equity (R<tspan font-size="14" dy="4">e</tspan><tspan dy="-4">)</tspan></text>
      <text x="510" y="20" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="700" fill="#4FCBA8" text-anchor="end">10.0%</text>
    </g>

    <!-- Debt cost row -->
    <g transform="translate(0,210)">
      <circle cx="14" cy="14" r="8" fill="#2D7E6E"/>
      <text x="40" y="20" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5">After-tax cost of debt (R<tspan font-size="14" dy="4">d</tspan><tspan dy="-4">·(1−t))</tspan></text>
      <text x="510" y="20" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" font-weight="700" fill="#2D7E6E" text-anchor="end">4.0%</text>
    </g>

    <!-- Divider -->
    <line x1="0" y1="270" x2="510" y2="270" stroke="#F4F4F5" stroke-opacity="0.15"/>

    <!-- Resulting WACC -->
    <g transform="translate(0,290)" filter="url(#waccGlow)">
      <rect x="0" y="0" width="510" height="62" rx="10" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="22" y="40" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#F4F4F5">Resulting WACC</text>
      <text x="488" y="42" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="30" font-weight="700" fill="#4FCBA8" text-anchor="end">8.2%</text>
    </g>

    <!-- Small print: example assumption note -->
    <text x="0" y="380" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.4">Illustrative inputs · actual WACC inputs vary by company</text>
  </g>
</svg>
