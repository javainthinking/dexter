<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `dcf-vs-comparable-company-analysis`. Left
  column carries the title + a comparison-key card. Right column is
  the actual scoreboard — two rows (DCF vs Comps) with three
  attribute columns (Anchors on / Time horizon / Sensitive to).
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="vsGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#vsBg)"/>

  <!-- Eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · VALUATION METHODS</text>

  <!-- Title -->
  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="600" fill="#F4F4F5" letter-spacing="-0.5">DCF</text>
  <text x="260" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="500" fill="#F4F4F5" opacity="0.5" letter-spacing="-0.5">vs</text>
  <text x="370" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="600" fill="#4FCBA8" letter-spacing="-0.5">Comps</text>

  <!-- Subtitle -->
  <text x="60" y="252" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Absolute vs Relative Valuation</text>

  <!-- Tagline -->
  <text x="60" y="298" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Two frameworks, one question.</text>
  <text x="60" y="324" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">When the answers disagree — that's the signal.</text>

  <!-- Key takeaway card -->
  <g transform="translate(60,420)">
    <rect x="0" y="0" width="540" height="130" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">THE BIG IDEA</text>
    <text x="22" y="66" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5">DCF prices the future cash.</text>
    <text x="22" y="92" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5">Comps prices the present multiple.</text>
    <text x="22" y="118" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.6">Run both. Report the spread. Explain the gap.</text>
  </g>

  <!-- Right column: side-by-side scoreboard -->
  <g transform="translate(660,140)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">HEAD-TO-HEAD</text>

    <!-- Header row -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#F4F4F5" opacity="0.5">
      <text x="220" y="32">DCF</text>
      <text x="395" y="32" fill="#4FCBA8">COMPS</text>
    </g>

    <!-- Row 1: Anchors on -->
    <g transform="translate(0,50)">
      <text x="0" y="22" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">Anchors on</text>
      <rect x="120" y="0" width="180" height="48" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.22"/>
      <text x="210" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">Future cash flow</text>
      <rect x="310" y="0" width="180" height="48" rx="8" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.55"/>
      <text x="400" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">Peer multiples</text>
    </g>

    <!-- Row 2: Time horizon -->
    <g transform="translate(0,116)">
      <text x="0" y="22" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">Time horizon</text>
      <rect x="120" y="0" width="180" height="48" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.22"/>
      <text x="210" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">5–10 yr + perpetuity</text>
      <rect x="310" y="0" width="180" height="48" rx="8" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.55"/>
      <text x="400" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">Next 12 months</text>
    </g>

    <!-- Row 3: Sensitive to -->
    <g transform="translate(0,182)">
      <text x="0" y="22" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">Sensitive to</text>
      <rect x="120" y="0" width="180" height="48" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.22"/>
      <text x="210" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">WACC + terminal margin</text>
      <rect x="310" y="0" width="180" height="48" rx="8" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.55"/>
      <text x="400" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5" text-anchor="middle">Peer set + multiple</text>
    </g>

    <!-- Spread callout under the scoreboard -->
    <g transform="translate(0,260)" filter="url(#vsGlow)">
      <line x1="0" y1="0" x2="490" y2="0" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" fill="#F4F4F5">When they disagree</text>
      <text x="0" y="58" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" opacity="0.9">→ the gap is itself the signal</text>
    </g>
  </g>
</svg>
