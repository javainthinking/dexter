<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `ma-vs-ema`. Left column: title + SMA/EMA
  reactivity card. Right column: price line with SMA (slow) and EMA
  (fast) both drawn — EMA visibly tracks price more closely.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">COMPARISON · TREND</text>

  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="600" fill="#F4F4F5" letter-spacing="-1">SMA ∙ EMA</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Stability vs reactivity — pick by job</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">SMA: long trend filters (200-day).</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">EMA: momentum tools (MACD 12 / 26).</text>

  <!-- Comparison card -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="580" height="160" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">REACTIVITY</text>
    <text x="22" y="66" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#f59e0b">SMA</tspan> — equal weight · ~N/2 bar lag · drops oldest bar discretely</text>
    <text x="22" y="98" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#60a5fa">EMA</tspan> — exponential decay · ~N/3 bar lag · smooth decay</text>
    <text x="22" y="132" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">At N = 200, the two lines sit within 1–2% of each other.</text>
  </g>

  <!-- Right column: price + SMA(20) + EMA(20) -->
  <g transform="translate(680,150)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">PRICE · SMA(20) · EMA(20)</text>

    <!-- Price -->
    <path d="M 0 280 L 25 260 L 50 240 L 75 280 L 100 220 L 125 200 L 150 240 L 175 180 L 200 160 L 225 200 L 250 130 L 275 110 L 300 140 L 325 80 L 350 100 L 375 60 L 400 90 L 425 40 L 450 70 L 460 80"
          fill="none" stroke="#F4F4F5" stroke-width="2" stroke-opacity="0.85"/>

    <!-- SMA(20) — orange, slower, smoother -->
    <path d="M 0 290 L 25 282 L 50 274 L 75 270 L 100 258 L 125 246 L 150 236 L 175 222 L 200 208 L 225 200 L 250 190 L 275 178 L 300 168 L 325 154 L 350 146 L 375 134 L 400 124 L 425 110 L 450 100 L 460 98"
          fill="none" stroke="#f59e0b" stroke-width="3"/>

    <!-- EMA(20) — blue, faster, tracks price more closely -->
    <path d="M 0 290 L 25 278 L 50 264 L 75 268 L 100 250 L 125 232 L 150 230 L 175 210 L 200 192 L 225 196 L 250 174 L 275 158 L 300 156 L 325 132 L 350 130 L 375 110 L 400 110 L 425 86 L 450 84 L 460 86"
          fill="none" stroke="#60a5fa" stroke-width="3"/>

    <!-- Lag callout -->
    <line x1="425" y1="40" x2="425" y2="86" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.4"/>
    <line x1="425" y1="86" x2="425" y2="110" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.4"/>
    <text x="438" y="60" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.5">price</text>
    <text x="438" y="92" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#60a5fa" opacity="0.7">EMA</text>
    <text x="438" y="118" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#f59e0b" opacity="0.7">SMA</text>

    <!-- Bottom callout -->
    <g transform="translate(0,350)">
      <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#F4F4F5" opacity="0.55" letter-spacing="2">RULE OF THUMB</text>
      <text x="0" y="28" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">SMA for the <tspan font-weight="600">map</tspan> (where price has been on average)</text>
      <text x="0" y="48" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">EMA for the <tspan font-weight="600">engine</tspan> (how momentum is changing now)</text>
    </g>

    <!-- Legend -->
    <g transform="translate(0,425)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#F4F4F5" stroke-width="2" stroke-opacity="0.85"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">PRICE</text>
      <line x1="90" y1="-3" x2="110" y2="-3" stroke="#f59e0b" stroke-width="3"/>
      <text x="116" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">SMA(20)</text>
      <line x1="200" y1="-3" x2="220" y2="-3" stroke="#60a5fa" stroke-width="3"/>
      <text x="226" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">EMA(20)</text>
    </g>
  </g>
</svg>
