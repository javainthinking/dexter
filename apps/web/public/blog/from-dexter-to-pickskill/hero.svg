<?xml version="1.0" encoding="UTF-8"?>
<!--
  Build-in-public hero for `from-dexter-to-pickskill`. Left column:
  eyebrow + title + tagline. Right column: before/after architecture —
  Dexter (open-source CLI) flowing via an arrow into the PickSkill web
  app, with the three added layers stacked beneath.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">BUILD-IN-PUBLIC · ARCHITECTURE</text>

  <text x="60" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Dexter → PickSkill</text>

  <text x="60" y="240" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="500" fill="#F4F4F5" opacity="0.85">From open-source CLI to a web analyst</text>

  <text x="60" y="284" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">We kept the agent loop. We added a web</text>
  <text x="60" y="310" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">app, Office files, and a portfolio suite.</text>

  <!-- Inheritance callout card -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="500" height="200" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">KEPT FROM DEXTER</text>
    <text x="22" y="62" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">Plan · execute · self-validate loop</text>
    <text x="22" y="86" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">Sourced output · editable assumptions</text>

    <line x1="22" y1="106" x2="478" y2="106" stroke="#F4F4F5" stroke-opacity="0.1"/>

    <text x="22" y="134" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">ADDED BY PICKSKILL</text>
    <text x="22" y="162" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">Web app · Word/PPT/Excel · 8 indicators</text>
    <text x="22" y="186" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">US · HK · A-share · 8 languages</text>
  </g>

  <!-- Right column: before/after architecture -->
  <g transform="translate(640,140)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">BEFORE → AFTER</text>

    <!-- BEFORE: Dexter CLI -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.3"/>
      <text x="18" y="28" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">OPEN SOURCE</text>
      <text x="18" y="58" font-family="Georgia, serif" font-size="22" fill="#F4F4F5" font-weight="600">Dexter</text>
      <text x="18" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.6">CLI agent · TS · Ink</text>
      <!-- terminal prompt glyph -->
      <text x="18" y="104" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#4FCBA8">&gt;_ research loop</text>
    </g>

    <!-- arrow -->
    <g transform="translate(240,60)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#4FCBA8" stroke-width="2"/>
      <polygon points="60,-6 72,0 60,6" fill="#4FCBA8"/>
    </g>

    <!-- AFTER: PickSkill web -->
    <g transform="translate(320,0)">
      <rect x="0" y="0" width="220" height="120" rx="8" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.5"/>
      <text x="18" y="28" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">WEB APP</text>
      <text x="18" y="58" font-family="Georgia, serif" font-size="22" fill="#F4F4F5" font-weight="600">PickSkill</text>
      <text x="18" y="80" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.6">browser · multi-tenant</text>
      <text x="18" y="104" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#4FCBA8">same agent loop</text>
    </g>

    <!-- connector down to added layers -->
    <line x1="430" y1="120" x2="430" y2="156" stroke="#4FCBA8" stroke-opacity="0.5" stroke-width="2"/>

    <!-- added layers stacked -->
    <text x="0" y="184" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">+ NEW LAYERS</text>

    <g transform="translate(0,200)">
      <rect x="0" y="0" width="540" height="44" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <circle cx="26" cy="22" r="5" fill="#4FCBA8"/>
      <text x="46" y="27" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Office generation — native .docx · .pptx · .xlsx</text>
    </g>
    <g transform="translate(0,254)">
      <rect x="0" y="0" width="540" height="44" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <circle cx="26" cy="22" r="5" fill="#4FCBA8"/>
      <text x="46" y="27" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Portfolio suite — 8 indicators · 5-day signal trail</text>
    </g>
    <g transform="translate(0,308)">
      <rect x="0" y="0" width="540" height="44" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <circle cx="26" cy="22" r="5" fill="#4FCBA8"/>
      <text x="46" y="27" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Markets — US · Hong Kong · A-share coverage</text>
    </g>

    <text x="0" y="392" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" font-weight="600">Built on github.com/virattt/dexter · MIT</text>
  </g>
</svg>
