<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-capital-flow`. Left column: title +
  MFI/CMF/OBV formula card. Right column: volume bars (red/green by
  direction) with the OBV cumulative line trending up underneath.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · PARTICIPATION</text>

  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Capital Flow</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Volume, weighted by who was buying</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">MFI · CMF · OBV — three lenses</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">on accumulation vs distribution.</text>

  <!-- Formula card -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="560" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULAS</text>
    <text x="22" y="64" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#F4F4F5">MFI = 100 − 100/(1 + MF+/MF−)</text>
    <text x="22" y="90" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#F4F4F5">CMF = Σ(MFM · V) / Σ V over N</text>
    <text x="22" y="116" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#F4F4F5">OBV[t] = OBV[t-1] ± V[t]</text>
    <text x="22" y="140" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#F4F4F5" opacity="0.55">where MFM = ((C-L)-(H-C)) / (H-L)</text>
  </g>

  <!-- Right column: volume bars + OBV cumulative line -->
  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">VOLUME (RED ↑ · GREEN ↓) · OBV TREND</text>

    <!-- Baseline -->
    <line x1="0" y1="260" x2="460" y2="260" stroke="#F4F4F5" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Volume bars: alternating heights, mostly red (buying pressure) -->
    <rect x="0" y="220" width="14" height="40" fill="#ef4444" opacity="0.7"/>
    <rect x="20" y="180" width="14" height="80" fill="#ef4444" opacity="0.85"/>
    <rect x="40" y="200" width="14" height="60" fill="#22c55e" opacity="0.7"/>
    <rect x="60" y="160" width="14" height="100" fill="#ef4444" opacity="0.85"/>
    <rect x="80" y="200" width="14" height="60" fill="#ef4444" opacity="0.75"/>
    <rect x="100" y="170" width="14" height="90" fill="#ef4444" opacity="0.85"/>
    <rect x="120" y="190" width="14" height="70" fill="#22c55e" opacity="0.7"/>
    <rect x="140" y="140" width="14" height="120" fill="#ef4444" opacity="0.95"/>
    <rect x="160" y="170" width="14" height="90" fill="#ef4444" opacity="0.85"/>
    <rect x="180" y="155" width="14" height="105" fill="#ef4444" opacity="0.9"/>
    <rect x="200" y="195" width="14" height="65" fill="#22c55e" opacity="0.7"/>
    <rect x="220" y="120" width="14" height="140" fill="#ef4444" opacity="1"/>
    <rect x="240" y="180" width="14" height="80" fill="#ef4444" opacity="0.8"/>
    <rect x="260" y="155" width="14" height="105" fill="#ef4444" opacity="0.9"/>
    <rect x="280" y="200" width="14" height="60" fill="#22c55e" opacity="0.65"/>
    <rect x="300" y="135" width="14" height="125" fill="#ef4444" opacity="0.95"/>
    <rect x="320" y="170" width="14" height="90" fill="#ef4444" opacity="0.85"/>
    <rect x="340" y="190" width="14" height="70" fill="#ef4444" opacity="0.8"/>
    <rect x="360" y="160" width="14" height="100" fill="#ef4444" opacity="0.9"/>
    <rect x="380" y="200" width="14" height="60" fill="#22c55e" opacity="0.7"/>
    <rect x="400" y="145" width="14" height="115" fill="#ef4444" opacity="0.95"/>
    <rect x="420" y="170" width="14" height="90" fill="#ef4444" opacity="0.85"/>
    <rect x="440" y="155" width="14" height="105" fill="#ef4444" opacity="0.9"/>

    <!-- OBV cumulative line, rising -->
    <path d="M 7 240 L 27 230 L 47 234 L 67 220 L 87 218 L 107 206 L 127 210 L 147 190 L 167 180 L 187 168 L 207 174 L 227 152 L 247 144 L 267 130 L 287 134 L 307 118 L 327 108 L 347 102 L 367 90 L 387 96 L 407 80 L 427 70 L 447 62"
          fill="none" stroke="#4FCBA8" stroke-width="3"/>
    <text x="460" y="58" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="end" font-weight="600">OBV ↑</text>

    <!-- Legend & callout -->
    <g transform="translate(0,310)">
      <rect x="0" y="-10" width="14" height="14" fill="#ef4444" opacity="0.85"/>
      <text x="22" y="2" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">up day</text>
      <rect x="90" y="-10" width="14" height="14" fill="#22c55e" opacity="0.7"/>
      <text x="112" y="2" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">down day</text>
      <line x1="190" y1="-3" x2="216" y2="-3" stroke="#4FCBA8" stroke-width="3"/>
      <text x="222" y="2" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">OBV (cumulative)</text>
    </g>
    <g transform="translate(0,360)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">Rising OBV under sideways price =</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">accumulation building underneath.</text>
    </g>
  </g>
</svg>
