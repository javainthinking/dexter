    <text x="48" y="98" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Financials — revenue, margins, FCF, debt, share count</text>

    <text x="22" y="128" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">3.</text>
    <text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Valuation — multiples + 5y DCF + peers</text>

    <text x="22" y="158" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">4.</text>
    <text x="48" y="158" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Technical setup — MA stack, MACD/RSI, S/R levels</text>

    <text x="22" y="188" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">5.</text>
    <text x="48" y="188" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Risks — 10-K risks + downside scenario</text>
