    <rect x="20" y="316" width="80" height="20" rx="4" fill="#4FCBA8" opacity="0.85"/>
    <text x="60" y="330" font-family="ui-monospace, monospace" font-size="11" fill="#14120b" font-weight="700" text-anchor="middle">WATCHLIST</text>
