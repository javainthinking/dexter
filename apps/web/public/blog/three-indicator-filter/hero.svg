<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero for `three-indicator-filter` — the how-to. Right column shows
  the three-step funnel: ADX (regime) → MACD (direction) → RSI (sanity).
  Each row gets a pass/fail visual that resolves into the "go" decision
  at the bottom.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">HOW-TO · MULTI-INDICATOR WORKFLOW</text>
  <text x="60" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="600" fill="#F4F4F5" letter-spacing="-1">3-Indicator Filter</text>
  <text x="60" y="210" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#F4F4F5" opacity="0.55">Stack indicators with discipline.</text>
  <text x="60" y="238" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#F4F4F5" opacity="0.55">Filter ~60% of false-positive signals.</text>

  <!-- Method card -->
  <g transform="translate(60,300)">
    <rect x="0" y="0" width="500" height="250" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2">METHOD · ORDER MATTERS</text>

    <text x="22" y="74" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="700" fill="#4FCBA8">1.</tspan> Regime check  →  <tspan font-family="ui-monospace, monospace" fill="#f59e0b">ADX &gt; 25?</tspan></text>
    <text x="42" y="98" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">if no → STOP. No trade today.</text>

    <text x="22" y="134" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="700" fill="#4FCBA8">2.</tspan> Direction trigger  →  <tspan font-family="ui-monospace, monospace" fill="#f59e0b">MACD cross?</tspan></text>
    <text x="42" y="158" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">golden = long, death = short / exit</text>

    <text x="22" y="194" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="700" fill="#4FCBA8">3.</tspan> Sanity check  →  <tspan font-family="ui-monospace, monospace" fill="#f59e0b">RSI healthy?</tspan></text>
    <text x="42" y="218" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">not above 80 or divergent. else skip.</text>
  </g>

  <!-- RIGHT column: stacked indicator strips (mock summary view) -->
  <g transform="translate(620,150)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">SUMMARY ROW · ALL THREE GREEN</text>

    <!-- Ticker label -->
    <g transform="translate(0,30)">
      <text x="0" y="20" font-family="ui-monospace, monospace" font-size="18" fill="#F4F4F5" font-weight="700">NVDA</text>
      <text x="0" y="40" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.55">NVIDIA Corp</text>
    </g>

    <!-- 5D % row (small price strip) -->
    <g transform="translate(0,90)">
      <text x="0" y="14" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.4" letter-spacing="2">5D %</text>
      <text x="80"  y="14" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">+1.2</text>
      <text x="140" y="14" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">+0.8</text>
      <text x="200" y="14" font-family="ui-monospace, monospace" font-size="13" fill="#ef4444">−0.4</text>
      <text x="260" y="14" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">+2.3</text>
      <text x="320" y="14" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">+1.5</text>
    </g>

    <!-- ADX row -->
    <g transform="translate(0,130)">
      <text x="0" y="20" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55">ADX</text>
      <rect x="60" y="3" width="180" height="28" rx="14" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
      <circle cx="78"  cy="17" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="98"  cy="17" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="118" cy="17" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="138" cy="17" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="160" cy="17" r="5" fill="#22c55e"/>
      <text x="178" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#22c55e" font-weight="600">Trending</text>
      <text x="260" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">32.1</text>
      <text x="310" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55">→ regime PASS</text>
    </g>

    <!-- MACD row -->
    <g transform="translate(0,180)">
      <text x="0" y="20" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55">MACD</text>
      <rect x="60" y="3" width="180" height="28" rx="14" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.45"/>
      <circle cx="78"  cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="98"  cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="118" cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="138" cy="17" r="4" fill="#22c55e" opacity="0.5"/>
      <circle cx="160" cy="17" r="5" fill="#22c55e"/>
      <text x="178" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#22c55e" font-weight="600">Golden cross</text>
      <text x="260" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">DIF=0.45</text>
      <text x="335" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55">→ trigger PASS</text>
    </g>

    <!-- RSI row -->
    <g transform="translate(0,230)">
      <text x="0" y="20" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55">RSI</text>
      <rect x="60" y="3" width="180" height="28" rx="14" fill="#94a3b8" fill-opacity="0.14" stroke="#94a3b8" stroke-opacity="0.45"/>
      <circle cx="78"  cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="98"  cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="118" cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="138" cy="17" r="4" fill="#94a3b8" opacity="0.5"/>
      <circle cx="160" cy="17" r="5" fill="#94a3b8"/>
      <text x="178" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8" font-weight="600">Healthy</text>
      <text x="260" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">58.4</text>
      <text x="310" y="22" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55">→ sanity PASS</text>
    </g>

    <!-- Verdict callout -->
    <g transform="translate(0,295)">
      <rect x="0" y="0" width="500" height="60" rx="10" fill="#4FCBA8" fill-opacity="0.12" stroke="#4FCBA8" stroke-opacity="0.55"/>
      <text x="20" y="26" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4FCBA8" font-weight="700">All 3 boxes ticked → high-conviction long</text>
      <text x="20" y="48" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.65">Filter outcome the bare MACD signal misses</text>
    </g>
  </g>
</svg>
