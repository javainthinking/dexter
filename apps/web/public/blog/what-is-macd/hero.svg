<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-macd`. Left column: title + formula card.
  Right column: a stylised MACD lower-pane visualisation with DIF / DEA
  lines crossing above the zero axis and red/green HIST bars (Chinese
  red-up / US green-down — we paint red for above zero, green for below,
  matching the project's default).
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Section eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · MOMENTUM</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">MACD</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Moving Average Convergence Divergence</text>

  <!-- Tagline -->
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Two EMAs, one signal line,</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">a zero axis that tells the truth.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="68" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#F4F4F5">DIF  = EMA(close,12) − EMA(close,26)</text>
    <text x="22" y="94" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#F4F4F5">DEA  = EMA(DIF,9)</text>
    <text x="22" y="116" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#F4F4F5" opacity="0.6">HIST = (DIF − DEA) × 2</text>
  </g>

  <!-- Right column: MACD lower-pane visualisation -->
  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">LOWER PANE · DIF / DEA / HIST</text>

    <!-- Zero axis -->
    <line x1="0" y1="180" x2="460" y2="180" stroke="#F4F4F5" stroke-opacity="0.32" stroke-width="1"/>
    <text x="-12" y="184" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#F4F4F5" opacity="0.5" text-anchor="end">0</text>

    <!-- HIST bars: green below zero (early), then red above as cross matures -->
    <!-- below-zero green bars -->
    <rect x="10"  y="180" width="14" height="38" fill="#22c55e" opacity="0.85"/>
    <rect x="32"  y="180" width="14" height="28" fill="#22c55e" opacity="0.85"/>
    <rect x="54"  y="180" width="14" height="18" fill="#22c55e" opacity="0.85"/>
    <rect x="76"  y="180" width="14" height="8"  fill="#22c55e" opacity="0.85"/>
    <!-- crossover region: tiny mixed bars -->
    <rect x="98"  y="174" width="14" height="6"  fill="#ef4444" opacity="0.85"/>
    <rect x="120" y="166" width="14" height="14" fill="#ef4444" opacity="0.85"/>
    <rect x="142" y="156" width="14" height="24" fill="#ef4444" opacity="0.85"/>
    <rect x="164" y="142" width="14" height="38" fill="#ef4444" opacity="0.85"/>
    <rect x="186" y="124" width="14" height="56" fill="#ef4444" opacity="0.85"/>
    <rect x="208" y="108" width="14" height="72" fill="#ef4444" opacity="0.85"/>
    <rect x="230" y="92"  width="14" height="88" fill="#ef4444" opacity="0.85"/>
    <rect x="252" y="80"  width="14" height="100" fill="#ef4444" opacity="0.85"/>
    <rect x="274" y="72"  width="14" height="108" fill="#ef4444" opacity="0.85"/>
    <rect x="296" y="68"  width="14" height="112" fill="#ef4444" opacity="0.85"/>
    <rect x="318" y="74"  width="14" height="106" fill="#ef4444" opacity="0.85"/>
    <rect x="340" y="84"  width="14" height="96"  fill="#ef4444" opacity="0.85"/>
    <rect x="362" y="98"  width="14" height="82"  fill="#ef4444" opacity="0.85"/>
    <rect x="384" y="114" width="14" height="66"  fill="#ef4444" opacity="0.85"/>
    <rect x="406" y="130" width="14" height="50"  fill="#ef4444" opacity="0.85"/>

    <!-- DIF line (orange) -->
    <path d="M 17 230 L 39 222 L 61 214 L 83 200 L 105 188 L 127 174 L 149 158 L 171 142 L 193 122 L 215 100 L 237 80 L 259 65 L 281 55 L 303 50 L 325 56 L 347 66 L 369 80 L 391 96 L 413 116"
          fill="none" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- DEA line (blue) -->
    <path d="M 17 218 L 39 214 L 61 210 L 83 204 L 105 196 L 127 188 L 149 178 L 171 168 L 193 156 L 215 142 L 237 124 L 259 106 L 281 88 L 303 76 L 325 70 L 347 70 L 369 76 L 391 88 L 413 102"
          fill="none" stroke="#3b82f6" stroke-width="2.5"/>

    <!-- Golden cross callout — between bars index ~5-6 (~110px) -->
    <g filter="url(#glow)">
      <circle cx="115" cy="178" r="9" fill="none" stroke="#4FCBA8" stroke-width="2.5"/>
    </g>
    <text x="115" y="252" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="middle" font-weight="600">Golden cross</text>
    <text x="115" y="270" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">water-below = reversal</text>

    <!-- Legend -->
    <g transform="translate(0,300)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">DIF</text>
      <line x1="78" y1="-3" x2="98" y2="-3" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="104" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">DEA</text>
      <rect x="160" y="-9" width="14" height="12" fill="#ef4444" opacity="0.85"/>
      <text x="180" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">HIST&gt;0</text>
      <rect x="262" y="-9" width="14" height="12" fill="#22c55e" opacity="0.85"/>
      <text x="282" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">HIST&lt;0</text>
    </g>
  </g>
</svg>
