<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `screen-stocks-for-golden-cross`. Left column:
  title + 4-step workflow card. Right column: a screener table with
  cross status (standard vs underwater) flagged per ticker.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">HOW-TO · SIGNALS</text>

  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="53" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Golden Cross Scan</text>

  <text x="60" y="244" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Find every fresh 50/200 cross — auto</text>

  <text x="60" y="288" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Underwater variant surfaced separately.</text>
  <text x="60" y="314" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Volume + slope filters built in.</text>

  <!-- Workflow card -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="580" height="200" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">4 STEPS · 60s</text>

    <text x="22" y="68" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">1.</text>
    <text x="48" y="68" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Open MA view at /indicators</text>

    <text x="22" y="100" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">2.</text>
    <text x="48" y="100" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Sort by underwater + freshness</text>

    <text x="22" y="132" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">3.</text>
    <text x="48" y="132" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Layer volume + ADX + S/R filters</text>

    <text x="22" y="164" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">4.</text>
    <text x="48" y="164" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Generate entry plan in chat</text>
  </g>

  <!-- Right column: screener table -->
  <g transform="translate(680,140)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">CROSS SCREENER · FRESH CROSSES</text>

    <rect x="0" y="0" width="460" height="380" rx="10" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.35"/>

    <!-- Header -->
    <rect x="0" y="0" width="460" height="32" rx="10" fill="#14120b"/>
    <rect x="0" y="22" width="460" height="10" fill="#14120b"/>
    <text x="14" y="22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">TICKER   CROSS         AGE    VOLUME</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5">
      <!-- Highlighted underwater rows -->
      <rect x="0" y="38" width="460" height="42" fill="#4FCBA8" opacity="0.1"/>
      <text x="14" y="56">AMD</text>
      <text x="90" y="56" fill="#4FCBA8" font-weight="600">UNDERWATER</text>
      <text x="270" y="56" fill="#4FCBA8">1 bar</text>
      <text x="370" y="56" fill="#4FCBA8">2.4× avg</text>
      <text x="14" y="72" opacity="0.55" font-size="10">200-day sloping down · ADX 28 · S/R confluence at entry</text>

      <line x1="0" y1="88" x2="460" y2="88" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <rect x="0" y="88" width="460" height="42" fill="#4FCBA8" opacity="0.06"/>
      <text x="14" y="106">META</text>
      <text x="90" y="106" fill="#4FCBA8" font-weight="600">UNDERWATER</text>
      <text x="270" y="106" fill="#4FCBA8">3 bars</text>
      <text x="370" y="106" fill="#4FCBA8">1.8× avg</text>
      <text x="14" y="122" opacity="0.55" font-size="10">200-day flat-to-down · volume confirmed</text>

      <!-- Standard golden crosses -->
      <line x1="0" y1="138" x2="460" y2="138" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="156">NVDA</text>
      <text x="90" y="156" opacity="0.85">standard</text>
      <text x="270" y="156">2 bars</text>
      <text x="370" y="156">1.6× avg</text>

      <line x1="0" y1="172" x2="460" y2="172" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="190">MSFT</text>
      <text x="90" y="190" opacity="0.85">standard</text>
      <text x="270" y="190">3 bars</text>
      <text x="370" y="190">1.3× avg</text>

      <line x1="0" y1="206" x2="460" y2="206" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="224">TSM</text>
      <text x="90" y="224" opacity="0.85">standard</text>
      <text x="270" y="224">4 bars</text>
      <text x="370" y="224">2.1× avg</text>

      <!-- Death cross alert -->
      <line x1="0" y1="240" x2="460" y2="240" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="258">SHOP</text>
      <text x="90" y="258" fill="#ef4444" font-weight="600">DEATH</text>
      <text x="270" y="258" fill="#ef4444">1 bar</text>
      <text x="370" y="258" fill="#ef4444">3.1× avg</text>

      <line x1="0" y1="274" x2="460" y2="274" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="292">CRWD</text>
      <text x="90" y="292" opacity="0.85">standard</text>
      <text x="270" y="292">5 bars</text>
      <text x="370" y="292">1.1× avg</text>

      <line x1="0" y1="308" x2="460" y2="308" stroke="#F4F4F5" stroke-opacity="0.08"/>
      <text x="14" y="326" opacity="0.4">…18 more · sorted by edge</text>
    </g>

    <!-- Bottom legend -->
    <g transform="translate(14,350)">
      <rect x="0" y="0" width="12" height="12" fill="#4FCBA8" opacity="0.85"/>
      <text x="18" y="10" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#F4F4F5" opacity="0.85">underwater · higher edge</text>
      <rect x="220" y="0" width="12" height="12" fill="#ef4444" opacity="0.85"/>
      <text x="238" y="10" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#F4F4F5" opacity="0.85">death cross · risk-off</text>
    </g>
  </g>
</svg>
