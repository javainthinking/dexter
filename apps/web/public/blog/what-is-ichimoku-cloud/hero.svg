<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FCBA8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4FCBA8" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · TREND</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="76" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Ichimoku Cloud</text>

  <text x="60" y="244" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">一目均衡表 · "one-glance equilibrium"</text>

  <text x="60" y="288" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Five lines, one cloud — a complete</text>
  <text x="60" y="314" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">trend system in one indicator.</text>

  <g transform="translate(60,360)">
    <rect x="0" y="0" width="580" height="200" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">5 COMPONENTS · DEFAULT (9, 26, 52)</text>

    <text x="22" y="66" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5"><tspan font-weight="600">Tenkan-sen</tspan> — 9-bar midpoint (short-term)</text>
    <text x="22" y="92" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5"><tspan font-weight="600">Kijun-sen</tspan> — 26-bar midpoint (medium-term)</text>
    <text x="22" y="118" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5"><tspan font-weight="600">Senkou A &amp; B</tspan> — leading cloud edges (+26 ahead)</text>
    <text x="22" y="144" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5"><tspan font-weight="600">Chikou Span</tspan> — current close shifted 26 behind</text>
    <text x="22" y="174" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">Price above cloud = uptrend · inside = consolidation · below = downtrend</text>
  </g>

  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">PRICE · TENKAN · KIJUN · CLOUD</text>

    <!-- Cloud shading -->
    <path d="M 0 220 L 60 215 L 120 200 L 180 180 L 240 155 L 300 130 L 360 110 L 420 95 L 460 90 L 460 130 L 420 140 L 360 155 L 300 175 L 240 195 L 180 215 L 120 230 L 60 240 L 0 245 Z"
          fill="url(#cloud)" stroke="#4FCBA8" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Tenkan-sen (cyan, fast) -->
    <path d="M 0 200 L 60 180 L 120 160 L 180 140 L 240 110 L 300 80 L 360 60 L 420 50 L 460 55"
          fill="none" stroke="#60a5fa" stroke-width="2.5"/>

    <!-- Kijun-sen (orange, slower) -->
    <path d="M 0 220 L 60 210 L 120 195 L 180 175 L 240 150 L 300 125 L 360 105 L 420 92 L 460 95"
          fill="none" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- Price line (white, above cloud) -->
    <path d="M 0 180 L 30 165 L 60 175 L 90 140 L 120 130 L 150 110 L 180 100 L 210 80 L 240 65 L 270 50 L 300 40 L 330 35 L 360 30 L 390 25 L 420 30 L 450 35 L 460 38"
          fill="none" stroke="#F4F4F5" stroke-width="2.5"/>

    <!-- Above-cloud callout -->
    <text x="240" y="20" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="middle" font-weight="600">PRICE ABOVE CLOUD</text>
    <text x="240" y="38" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" text-anchor="middle" opacity="0.6">uptrend confirmed</text>

    <!-- Legend -->
    <g transform="translate(0,300)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#F4F4F5" stroke-width="2.5"/>
      <text x="26" y="1" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">price</text>
      <line x1="80" y1="-3" x2="100" y2="-3" stroke="#60a5fa" stroke-width="2.5"/>
      <text x="106" y="1" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">Tenkan</text>
      <line x1="170" y1="-3" x2="190" y2="-3" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="196" y="1" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">Kijun</text>
      <rect x="245" y="-9" width="14" height="12" fill="url(#cloud)" stroke="#4FCBA8" stroke-opacity="0.5"/>
      <text x="265" y="1" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.85">cloud (Kumo)</text>
    </g>
  </g>
</svg>
