<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `technical-vs-fundamental-analysis`. Left column:
  title + horizon-rule card. Right column: a horizon timeline showing
  TA dominance at short range and FA dominance at long range.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="taGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="faGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">COMPARISON · METHOD</text>

  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="600" fill="#F4F4F5" letter-spacing="-1">TA ∙ FA</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Technical vs Fundamental Analysis</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Not opposing camps. Different</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">questions, different horizons.</text>

  <!-- Framework card -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="580" height="160" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">HYBRID FRAMEWORK</text>
    <text x="22" y="66" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#f59e0b">FA</tspan> narrows the universe — what to own</text>
    <text x="22" y="92" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#60a5fa">TA</tspan> times the entries — when to act</text>
    <text x="22" y="118" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#f59e0b">FA</tspan> defines exits — thesis breakdown</text>
    <text x="22" y="144" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5"><tspan font-weight="600" fill="#60a5fa">TA</tspan> defines stops — non-thesis trades</text>
  </g>

  <!-- Right column: horizon timeline -->
  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">DOMINANCE BY HORIZON</text>

    <!-- TA dominance bar -->
    <text x="0" y="40" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#60a5fa" font-weight="600">TECHNICAL</text>
    <rect x="0" y="55" width="460" height="40" rx="6" fill="url(#taGrad)"/>

    <!-- FA dominance bar -->
    <text x="0" y="135" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#f59e0b" font-weight="600">FUNDAMENTAL</text>
    <rect x="0" y="150" width="460" height="40" rx="6" fill="url(#faGrad)"/>

    <!-- Horizon axis -->
    <line x1="0" y1="220" x2="460" y2="220" stroke="#F4F4F5" stroke-opacity="0.25" stroke-width="1"/>
    <!-- Ticks -->
    <line x1="0"   y1="218" x2="0"   y2="226" stroke="#F4F4F5" stroke-opacity="0.45"/>
    <line x1="115" y1="218" x2="115" y2="226" stroke="#F4F4F5" stroke-opacity="0.45"/>
    <line x1="230" y1="218" x2="230" y2="226" stroke="#F4F4F5" stroke-opacity="0.45"/>
    <line x1="345" y1="218" x2="345" y2="226" stroke="#F4F4F5" stroke-opacity="0.45"/>
    <line x1="460" y1="218" x2="460" y2="226" stroke="#F4F4F5" stroke-opacity="0.45"/>

    <text x="0"   y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.55">1d</text>
    <text x="115" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">1m</text>
    <text x="230" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">1y</text>
    <text x="345" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">3y</text>
    <text x="460" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="end">10y+</text>
    <text x="230" y="270" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="middle" letter-spacing="2">HORIZON</text>

    <!-- Bottom callout -->
    <g transform="translate(0,320)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">The unhelpful "TA vs FA" debate is a</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">category error — they answer</text>
      <text x="0" y="44" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">different questions over different horizons.</text>
    </g>
  </g>
</svg>
