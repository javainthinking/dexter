<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-pe-ratio`. Left: title + formula card.
  Right: a horizontal "P/E reading" scale with example bands from
  "deep value" → "normal" → "growth premium" → "hyper-growth", and a
  small Price/Earnings stacked-bar visual.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="peBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="peScale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#2D7E6E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4FCBA8" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#peBg)"/>

  <!-- Eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · MULTIPLES</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">P/E</text>
  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Price-to-Earnings Ratio</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">The fastest sanity check in valuation —</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">if you remember it's only half a fact.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="520" height="130" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="78" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">P/E = Price per share</text>
    <text x="120" y="106" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">÷ Earnings per share</text>
  </g>

  <!-- Right: P/E reading scale -->
  <g transform="translate(660,150)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">READING THE NUMBER</text>

    <!-- Gradient scale bar -->
    <rect x="0" y="20" width="490" height="36" rx="6" fill="url(#peScale)"/>
    <!-- Tick marks + labels under -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.75">
      <text x="0" y="80">&lt; 10</text>
      <text x="115" y="80">10–15</text>
      <text x="225" y="80">15–25</text>
      <text x="345" y="80">25–40</text>
      <text x="450" y="80" text-anchor="end" fill="#4FCBA8" opacity="1">40+</text>
    </g>
    <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.5">
      <text x="0" y="100">deep value</text>
      <text x="115" y="100">mature</text>
      <text x="225" y="100">market norm</text>
      <text x="345" y="100">growth premium</text>
      <text x="490" y="100" text-anchor="end" opacity="0.85">hyper-growth</text>
    </g>

    <!-- Variant chips below -->
    <g transform="translate(0,140)">
      <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">THREE VARIANTS</text>

      <g transform="translate(0,20)">
        <rect x="0" y="0" width="155" height="56" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.22"/>
        <text x="14" y="24" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5">Trailing P/E</text>
        <text x="14" y="44" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.55">past 12 mo earnings</text>
      </g>
      <g transform="translate(170,20)">
        <rect x="0" y="0" width="155" height="56" rx="8" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.55"/>
        <text x="14" y="24" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5">Forward P/E</text>
        <text x="14" y="44" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.55">next 12 mo consensus</text>
      </g>
      <g transform="translate(340,20)">
        <rect x="0" y="0" width="155" height="56" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.22"/>
        <text x="14" y="24" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#F4F4F5">Shiller CAPE</text>
        <text x="14" y="44" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.55">10-yr smoothed</text>
      </g>
    </g>
  </g>
</svg>
