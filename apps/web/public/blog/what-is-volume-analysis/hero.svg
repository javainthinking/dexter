<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-volume-analysis`. Left column: title +
  RVOL/VROC formula card. Right column: volume histogram with a 20-day
  average baseline and one exceptional spike highlighted (the 2.5× RVOL
  conviction bar).
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · PARTICIPATION</text>

  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Volume</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">The confirmation layer most retail skips</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Breakout · climax · dry-up · divergence —</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">four patterns that actually matter.</text>

  <!-- Formula card -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="560" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULAS</text>
    <text x="22" y="66" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#F4F4F5">RVOL = Volume[t] / SMA(Volume, 20)</text>
    <text x="22" y="96" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#F4F4F5">VROC = (V[t] − V[t−14]) / V[t−14]</text>
    <text x="22" y="130" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.6">RVOL &gt; 1.5 → meaningful · &gt; 2.5 → exceptional</text>
  </g>

  <!-- Right column: volume histogram with average baseline + exceptional spike -->
  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">VOLUME · 20-DAY AVG · 2.5× RVOL EVENT</text>

    <!-- Baseline -->
    <line x1="0" y1="280" x2="460" y2="280" stroke="#F4F4F5" stroke-opacity="0.2" stroke-width="1"/>

    <!-- 20-day average reference line -->
    <line x1="0" y1="210" x2="460" y2="210" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.7"/>
    <text x="466" y="214" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#f59e0b" opacity="0.85">20D AVG</text>

    <!-- Volume bars -->
    <rect x="0" y="240" width="16" height="40" fill="#60a5fa" opacity="0.5"/>
    <rect x="20" y="222" width="16" height="58" fill="#60a5fa" opacity="0.5"/>
    <rect x="40" y="246" width="16" height="34" fill="#60a5fa" opacity="0.5"/>
    <rect x="60" y="210" width="16" height="70" fill="#60a5fa" opacity="0.55"/>
    <rect x="80" y="234" width="16" height="46" fill="#60a5fa" opacity="0.5"/>
    <rect x="100" y="216" width="16" height="64" fill="#60a5fa" opacity="0.55"/>
    <rect x="120" y="252" width="16" height="28" fill="#60a5fa" opacity="0.45"/>
    <rect x="140" y="228" width="16" height="52" fill="#60a5fa" opacity="0.5"/>
    <rect x="160" y="206" width="16" height="74" fill="#60a5fa" opacity="0.55"/>
    <rect x="180" y="244" width="16" height="36" fill="#60a5fa" opacity="0.5"/>
    <!-- The exceptional 2.5x RVOL spike -->
    <g filter="url(#glow)">
      <rect x="200" y="95" width="16" height="185" fill="#4FCBA8" opacity="0.95"/>
    </g>
    <rect x="220" y="216" width="16" height="64" fill="#60a5fa" opacity="0.55"/>
    <rect x="240" y="238" width="16" height="42" fill="#60a5fa" opacity="0.5"/>
    <rect x="260" y="222" width="16" height="58" fill="#60a5fa" opacity="0.5"/>
    <rect x="280" y="246" width="16" height="34" fill="#60a5fa" opacity="0.5"/>
    <rect x="300" y="214" width="16" height="66" fill="#60a5fa" opacity="0.55"/>
    <rect x="320" y="230" width="16" height="50" fill="#60a5fa" opacity="0.5"/>
    <rect x="340" y="252" width="16" height="28" fill="#60a5fa" opacity="0.45"/>
    <rect x="360" y="220" width="16" height="60" fill="#60a5fa" opacity="0.55"/>
    <rect x="380" y="206" width="16" height="74" fill="#60a5fa" opacity="0.55"/>
    <rect x="400" y="240" width="16" height="40" fill="#60a5fa" opacity="0.5"/>
    <rect x="420" y="232" width="16" height="48" fill="#60a5fa" opacity="0.5"/>
    <rect x="440" y="220" width="16" height="60" fill="#60a5fa" opacity="0.55"/>

    <!-- Spike callout -->
    <line x1="208" y1="90" x2="208" y2="65" stroke="#4FCBA8" stroke-width="1" stroke-opacity="0.6"/>
    <text x="208" y="55" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="700" text-anchor="middle">2.5× RVOL</text>
    <text x="208" y="40" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.6" text-anchor="middle">exceptional event</text>

    <!-- Bottom callout -->
    <g transform="translate(0,330)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">A breakout on heavy volume tells you</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">conviction backs the move.</text>
      <text x="0" y="44" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">Below-average volume = treat as half-conviction.</text>
    </g>
  </g>
</svg>
