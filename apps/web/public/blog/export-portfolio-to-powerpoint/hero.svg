<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `export-portfolio-to-powerpoint`. Left column:
  title + 4-step workflow card. Right column: stacked slide thumbnails
  representing the generated deck.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">HOW-TO · EXPORT</text>

  <text x="60" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Portfolio → PPT</text>

  <text x="60" y="244" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">A presentation-ready deck in 60 seconds</text>

  <text x="60" y="288" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Every chart sourced from live data,</text>
  <text x="60" y="314" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">every slide editable.</text>

  <!-- Workflow card -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="580" height="200" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">4 STEPS · 60s</text>

    <text x="22" y="68" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">1.</text>
    <text x="48" y="68" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Open portfolio at /portfolios</text>

    <text x="22" y="100" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">2.</text>
    <text x="48" y="100" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Click <tspan font-family="ui-monospace" fill="#F4F4F5">Export to PowerPoint</tspan></text>

    <text x="22" y="132" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">3.</text>
    <text x="48" y="132" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Wait ~30s while PickSkill assembles</text>

    <text x="22" y="164" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">4.</text>
    <text x="48" y="164" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Download .pptx · edit any slide</text>
  </g>

  <!-- Right column: slide deck stack -->
  <g transform="translate(680,140)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">10-SLIDE DEFAULT STRUCTURE</text>

    <!-- Stacked slide thumbnails -->
    <!-- back layer -->
    <g transform="translate(40,30) rotate(-3)" opacity="0.5">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.2"/>
      <rect x="20" y="20" width="160" height="14" fill="#F4F4F5" opacity="0.5"/>
      <rect x="20" y="44" width="100" height="8" fill="#F4F4F5" opacity="0.3"/>
    </g>
    <!-- middle layer -->
    <g transform="translate(20,15) rotate(-1.5)" opacity="0.75">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.3"/>
      <rect x="20" y="20" width="200" height="14" fill="#F4F4F5" opacity="0.65"/>
      <rect x="20" y="46" width="140" height="8" fill="#F4F4F5" opacity="0.4"/>
      <!-- mini chart -->
      <rect x="20" y="80" width="200" height="120" rx="4" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.18"/>
      <polyline points="30,170 60,150 90,135 120,110 150,125 180,85 210,95" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    </g>
    <!-- front layer (visible deck cover) -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.5"/>
      <text x="20" y="36" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">SLIDE 1 · COVER</text>
      <text x="20" y="76" font-family="Georgia, serif" font-size="22" fill="#F4F4F5" font-weight="600">My Tech Portfolio</text>
      <text x="20" y="100" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.6">12 holdings · 2026-05-26</text>
      <!-- mini holdings table -->
      <rect x="20" y="130" width="340" height="70" rx="4" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.18"/>
      <line x1="160" y1="130" x2="160" y2="200" stroke="#F4F4F5" stroke-opacity="0.1"/>
      <line x1="260" y1="130" x2="260" y2="200" stroke="#F4F4F5" stroke-opacity="0.1"/>
      <line x1="20" y1="150" x2="360" y2="150" stroke="#F4F4F5" stroke-opacity="0.1"/>
      <text x="30" y="146" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#F4F4F5" opacity="0.55">TICKER</text>
      <text x="170" y="146" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#F4F4F5" opacity="0.55">SIGNAL</text>
      <text x="270" y="146" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#F4F4F5" opacity="0.55">5D</text>
      <text x="30" y="166" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5">NVDA</text>
      <circle cx="170" cy="163" r="3" fill="#4FCBA8"/>
      <text x="180" y="166" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5">↑ bull</text>
      <text x="270" y="166" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8">+3.2%</text>
      <text x="30" y="184" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5">TSM</text>
      <circle cx="170" cy="181" r="3" fill="#4FCBA8"/>
      <text x="180" y="184" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5">↑ bull</text>
      <text x="270" y="184" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8">+1.8%</text>
    </g>

    <!-- bottom callout -->
    <g transform="translate(0,300)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">Cover · holdings · signals · valuation ·</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">per-name detail · risks · appendix</text>
      <text x="0" y="48" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" font-weight="600">Real .pptx · open in PowerPoint or Keynote</text>
    </g>
  </g>
</svg>
