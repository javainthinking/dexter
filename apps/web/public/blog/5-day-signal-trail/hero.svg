<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero for `5-day-signal-trail` — the product story. Right column shows
  the three trail patterns we name in the post: stable, flipping,
  flickering. Each is a row of five dots inside a pill, beneath the
  bucket label. Title positions this as a PRODUCT explainer, not a
  generic indicator post.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="80" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">PRODUCT · PICKSKILL INDICATORS</text>
  <text x="60" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="600" fill="#F4F4F5" letter-spacing="-1">5-Day Signal Trail</text>
  <text x="60" y="220" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#F4F4F5" opacity="0.55">Today's bucket lies. The week tells the truth.</text>

  <text x="60" y="282" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5" opacity="0.75">Every indicator card carries the last 5 trading days</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5" opacity="0.75">of bucket calls — five dots, oldest left to newest right.</text>
  <text x="60" y="350" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5" opacity="0.75">Three patterns emerge. Read them, save 60% of</text>
  <text x="60" y="374" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#F4F4F5" opacity="0.75">single-day false positives.</text>

  <!-- Bottom-left brand mark -->
  <text x="60" y="550" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#4FCBA8" letter-spacing="3" opacity="0.7">PICKSKILL.AI/INDICATORS</text>

  <!-- RIGHT column: three trail patterns -->
  <g transform="translate(620,150)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">THREE TRAIL PATTERNS</text>

    <!-- Pattern 1: stable bullish -->
    <g transform="translate(0,30)">
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.55">1 · STABLE</text>
      <text x="0" y="42" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" font-weight="600">Trust the signal at face value</text>
      <!-- pill -->
      <g transform="translate(0,60)">
        <rect x="0" y="0" width="500" height="46" rx="23" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.45"/>
        <!-- 5 dots, all green -->
        <circle cx="30" cy="23" r="6"  fill="#22c55e" opacity="0.5"/>
        <circle cx="56" cy="23" r="6"  fill="#22c55e" opacity="0.5"/>
        <circle cx="82" cy="23" r="6"  fill="#22c55e" opacity="0.5"/>
        <circle cx="108" cy="23" r="6" fill="#22c55e" opacity="0.5"/>
        <circle cx="138" cy="23" r="8" fill="#22c55e"/>
        <text x="160" y="29" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#22c55e" font-weight="600">Bullish · golden cross</text>
      </g>
    </g>

    <!-- Pattern 2: flipping bearish → bullish -->
    <g transform="translate(0,170)">
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.55">2 · FLIPPING</text>
      <text x="0" y="42" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" font-weight="600">Real regime change — most actionable</text>
      <!-- pill -->
      <g transform="translate(0,60)">
        <rect x="0" y="0" width="500" height="46" rx="23" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.45"/>
        <circle cx="30" cy="23" r="6"  fill="#ef4444" opacity="0.5"/>
        <circle cx="56" cy="23" r="6"  fill="#ef4444" opacity="0.5"/>
        <circle cx="82" cy="23" r="6"  fill="#94a3b8" opacity="0.5"/>
        <circle cx="108" cy="23" r="6" fill="#22c55e" opacity="0.5"/>
        <circle cx="138" cy="23" r="8" fill="#22c55e"/>
        <text x="160" y="29" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#22c55e" font-weight="600">Bullish · reversal confirmed</text>
      </g>
    </g>

    <!-- Pattern 3: flickering -->
    <g transform="translate(0,310)">
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.55">3 · FLICKERING</text>
      <text x="0" y="42" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" font-weight="600">Noise — ignore today's call</text>
      <!-- pill -->
      <g transform="translate(0,60)">
        <rect x="0" y="0" width="500" height="46" rx="23" fill="#94a3b8" fill-opacity="0.12" stroke="#94a3b8" stroke-opacity="0.45"/>
        <circle cx="30" cy="23" r="6"  fill="#22c55e" opacity="0.5"/>
        <circle cx="56" cy="23" r="6"  fill="#ef4444" opacity="0.5"/>
        <circle cx="82" cy="23" r="6"  fill="#22c55e" opacity="0.5"/>
        <circle cx="108" cy="23" r="6" fill="#ef4444" opacity="0.5"/>
        <circle cx="138" cy="23" r="8" fill="#22c55e"/>
        <text x="160" y="29" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">Bullish · low confidence</text>
      </g>
    </g>
  </g>
</svg>
