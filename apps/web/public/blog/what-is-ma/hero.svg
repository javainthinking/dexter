<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-ma`. Left column: title + formula card
  (SMA + EMA formulas side by side). Right column: stylised price line
  with three moving averages stacked at 20 / 60 / 200 — illustrating
  the standard trend-filter stack.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Section eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · TREND</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">MA</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Moving Average</text>

  <!-- Tagline -->
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">The filter every trend tool</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">is quietly built on.</text>

  <!-- Formula card -->
  <g transform="translate(60,400)">
    <rect x="0" y="0" width="540" height="150" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="68" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#F4F4F5">SMA(N) = Σ close[t..t-N+1] / N</text>
    <text x="22" y="98" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#F4F4F5">EMA(N) = α·close[t] + (1-α)·EMA[t-1]</text>
    <text x="22" y="126" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#F4F4F5" opacity="0.6">α = 2 / (N + 1)</text>
  </g>

  <!-- Right column: price with 20/60/200 MA stack -->
  <g transform="translate(680,150)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">PRICE · MA(20) · MA(60) · MA(200)</text>

    <!-- chart axis -->
    <line x1="0" y1="320" x2="460" y2="320" stroke="#F4F4F5" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Price line (most jagged) -->
    <path d="M 0 240 L 25 220 L 50 250 L 75 200 L 100 180 L 125 220 L 150 170 L 175 200 L 200 160 L 225 130 L 250 170 L 275 110 L 300 140 L 325 80 L 350 60 L 375 100 L 400 70 L 425 50 L 450 30 L 460 35"
          fill="none" stroke="#F4F4F5" stroke-width="2" stroke-opacity="0.85"/>

    <!-- MA(20) — light blue, follows price closely -->
    <path d="M 0 250 L 25 235 L 50 235 L 75 220 L 100 210 L 125 215 L 150 200 L 175 195 L 200 185 L 225 175 L 250 175 L 275 155 L 300 150 L 325 130 L 350 110 L 375 100 L 400 90 L 425 75 L 450 60 L 460 58"
          fill="none" stroke="#60a5fa" stroke-width="2.5"/>

    <!-- MA(60) — emerald, smoother -->
    <path d="M 0 260 L 25 255 L 50 252 L 75 248 L 100 240 L 125 235 L 150 230 L 175 220 L 200 210 L 225 200 L 250 195 L 275 180 L 300 170 L 325 158 L 350 145 L 375 130 L 400 118 L 425 105 L 450 92 L 460 89"
          fill="none" stroke="#4FCBA8" stroke-width="2.5"/>

    <!-- MA(200) — amber, slowest -->
    <path d="M 0 285 L 25 282 L 50 280 L 75 278 L 100 275 L 125 272 L 150 268 L 175 264 L 200 258 L 225 252 L 250 246 L 275 238 L 300 230 L 325 220 L 350 210 L 375 200 L 400 190 L 425 180 L 450 170 L 460 167"
          fill="none" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- Golden cross callout where MA(20) crosses MA(60) -->
    <circle cx="100" cy="210" r="9" fill="none" stroke="#4FCBA8" stroke-width="2.5"/>
    <text x="100" y="370" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="middle" font-weight="600">Cross</text>
    <text x="100" y="386" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">trend turns up</text>

    <!-- Legend -->
    <g transform="translate(0,415)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#F4F4F5" stroke-width="2" stroke-opacity="0.85"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">PRICE</text>
      <line x1="90" y1="-3" x2="110" y2="-3" stroke="#60a5fa" stroke-width="2.5"/>
      <text x="116" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">MA(20)</text>
      <line x1="200" y1="-3" x2="220" y2="-3" stroke="#4FCBA8" stroke-width="2.5"/>
      <text x="226" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">MA(60)</text>
      <line x1="310" y1="-3" x2="330" y2="-3" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="336" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">MA(200)</text>
    </g>
  </g>
</svg>
