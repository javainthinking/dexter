<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `how-to-read-10k`. Left column carries the title
  and the formula-card replacement (a "30-minute workflow" summary).
  Right column visualises the 10-K's 15 numbered Items with the four
  that matter highlighted, plus the read-order arrows.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tkBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="tkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#tkBg)"/>

  <!-- Eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">HOW-TO · FILINGS</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">10-K</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Annual Report Reading Guide</text>

  <!-- Tagline -->
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">What Wall Street actually reads —</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">in 30 minutes.</text>

  <!-- Workflow card (replaces the formula card) -->
  <g transform="translate(60,420)">
    <rect x="0" y="0" width="520" height="130" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">30-MIN WORKFLOW</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="#F4F4F5">
      <text x="22"  y="64">1. MD&amp;A (Item 7)</text>
      <text x="380" y="64" text-anchor="end" fill="#4FCBA8" opacity="0.85">15 min</text>
      <text x="22"  y="88">2. Financials (Item 8)</text>
      <text x="380" y="88" text-anchor="end" fill="#4FCBA8" opacity="0.85">10 min</text>
      <text x="22" y="112">3. Risk Factors diff (1A)</text>
      <text x="380" y="112" text-anchor="end" fill="#4FCBA8" opacity="0.85">5 min</text>
    </g>
  </g>

  <!-- Right column: 10-K item grid -->
  <g transform="translate(660,140)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">15 ITEMS · 4 THAT MATTER</text>

    <!-- 15 item cells laid out 5×3 -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13">
      <!-- Row 1: Items 1, 1A*, 1B, 2, 3 -->
      <rect x="0"   y="20" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="45" y="44" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 1</text>
      <text x="45" y="62" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Business</text>

      <!-- Item 1A — highlighted -->
      <rect x="100" y="20" width="90" height="56" rx="6" fill="#4FCBA8" filter="url(#tkGlow)"/>
      <text x="145" y="44" fill="#14120b" font-weight="700" text-anchor="middle">Item 1A</text>
      <text x="145" y="62" fill="#14120b" opacity="0.85" text-anchor="middle" font-size="10">Risk Factors</text>

      <rect x="200" y="20" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="245" y="44" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 1B</text>
      <text x="245" y="62" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Unresolved</text>

      <rect x="300" y="20" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="345" y="44" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 2</text>
      <text x="345" y="62" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Properties</text>

      <rect x="400" y="20" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="445" y="44" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 3</text>
      <text x="445" y="62" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Legal</text>

      <!-- Row 2: Items 4, 5, 6, 7*, 7A -->
      <rect x="0"   y="86" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="45" y="110" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 4</text>
      <text x="45" y="128" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Mine Safety</text>

      <rect x="100" y="86" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="145" y="110" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 5</text>
      <text x="145" y="128" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Market</text>

      <rect x="200" y="86" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="245" y="110" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 6</text>
      <text x="245" y="128" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">[Reserved]</text>

      <!-- Item 7 — highlighted -->
      <rect x="300" y="86" width="90" height="56" rx="6" fill="#4FCBA8" filter="url(#tkGlow)"/>
      <text x="345" y="110" fill="#14120b" font-weight="700" text-anchor="middle">Item 7</text>
      <text x="345" y="128" fill="#14120b" opacity="0.85" text-anchor="middle" font-size="10">MD&amp;A</text>

      <rect x="400" y="86" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="445" y="110" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 7A</text>
      <text x="445" y="128" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Mkt Risk</text>

      <!-- Row 3: Items 8*, 9, 9A, 9B, 10–15 condensed -->
      <!-- Item 8 — highlighted -->
      <rect x="0" y="152" width="90" height="56" rx="6" fill="#4FCBA8" filter="url(#tkGlow)"/>
      <text x="45" y="176" fill="#14120b" font-weight="700" text-anchor="middle">Item 8</text>
      <text x="45" y="194" fill="#14120b" opacity="0.85" text-anchor="middle" font-size="10">Financials</text>

      <rect x="100" y="152" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="145" y="176" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 9</text>
      <text x="145" y="194" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Changes</text>

      <rect x="200" y="152" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="245" y="176" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 9A</text>
      <text x="245" y="194" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Controls</text>

      <rect x="300" y="152" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="345" y="176" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Item 9B</text>
      <text x="345" y="194" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Other</text>

      <rect x="400" y="152" width="90" height="56" rx="6" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="445" y="176" fill="#F4F4F5" opacity="0.5" text-anchor="middle">10–15</text>
      <text x="445" y="194" fill="#F4F4F5" opacity="0.4" text-anchor="middle" font-size="10">Governance</text>
    </g>

    <!-- Legend -->
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#4FCBA8"/>
      <text x="22" y="12" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.85">Read carefully</text>
      <rect x="170" y="0" width="14" height="14" rx="3" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.18"/>
      <text x="192" y="12" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.5">Skim or skip</text>
    </g>
  </g>
</svg>
