<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · FUNDAMENTALS</text>

  <text x="60" y="220" font-family="Georgia, serif" font-size="92" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Market Cap</text>

  <text x="60" y="262" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">Equity value × shares — not whole-business value</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">For acquisitions and like-for-like</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">compare, use enterprise value (EV).</text>

  <g transform="translate(60,400)">
    <rect x="0" y="0" width="580" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULAS</text>
    <text x="22" y="66" font-family="ui-monospace, monospace" font-size="18" fill="#F4F4F5">Market Cap = Price × Diluted Shares</text>
    <text x="22" y="96" font-family="ui-monospace, monospace" font-size="18" fill="#F4F4F5">EV         = Market Cap + Debt − Cash</text>
    <text x="22" y="128" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.55">Mega-cap &gt;$200B · large &gt;$10B · mid &gt;$2B · small &gt;$500M</text>
  </g>

  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">SAME MKT CAP — DIFFERENT EV</text>

    <!-- Company A: cash-rich -->
    <g transform="translate(0,20)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#4FCBA8" font-weight="600">COMPANY A (cash-rich)</text>
      <rect x="0" y="16" width="220" height="22" fill="#60a5fa" opacity="0.85"/>
      <text x="230" y="32" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">Mkt Cap $100B</text>
      <rect x="0" y="46" width="11" height="22" fill="#f59e0b" opacity="0.6"/>
      <text x="20" y="62" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.7">+ Debt $5B</text>
      <rect x="0" y="76" width="66" height="22" fill="#ef4444" opacity="0.45"/>
      <text x="74" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.7">− Cash $30B</text>
      <text x="0" y="120" font-family="ui-monospace, monospace" font-size="13" fill="#4FCBA8" font-weight="600">= EV $75B</text>
    </g>

    <!-- Divider -->
    <line x1="0" y1="160" x2="460" y2="160" stroke="#F4F4F5" stroke-opacity="0.1"/>

    <!-- Company B: leveraged -->
    <g transform="translate(0,180)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#ef4444" font-weight="600">COMPANY B (leveraged)</text>
      <rect x="0" y="16" width="220" height="22" fill="#60a5fa" opacity="0.85"/>
      <text x="230" y="32" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">Mkt Cap $100B</text>
      <rect x="0" y="46" width="110" height="22" fill="#f59e0b" opacity="0.85"/>
      <text x="120" y="62" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">+ Debt $50B</text>
      <rect x="0" y="76" width="11" height="22" fill="#ef4444" opacity="0.45"/>
      <text x="20" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.7">− Cash $5B</text>
      <text x="0" y="120" font-family="ui-monospace, monospace" font-size="13" fill="#ef4444" font-weight="600">= EV $145B</text>
    </g>

    <g transform="translate(0,330)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">Identical headline market cap.</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">Company B's "real" size is ~2× Company A's.</text>
    </g>
  </g>
</svg>
