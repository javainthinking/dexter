<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-adx`. Right column shows the ADX line
  rising through the 25 threshold (orange) with DI+ (red) climbing above
  DI− (green) — the canonical "strong uptrend confirmed" pattern.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · TREND STRENGTH</text>
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">ADX</text>
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Average Directional Index</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Tells you whether a trend exists.</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Then DI+ / DI− tell you which way.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA · ADX(14)</text>
    <text x="22" y="64" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5">DI+ = 100 · smooth(+DM) / smooth(TR)</text>
    <text x="22" y="86" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5">DI− = 100 · smooth(−DM) / smooth(TR)</text>
    <text x="22" y="108" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5" opacity="0.85">ADX = Wilder-smooth( 100·|DI+ − DI−|/(DI+ + DI−) )</text>
  </g>

  <!-- Right column: ADX / DI chart -->
  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">ADX RISING · DI+ ABOVE DI−</text>

    <!-- Y axis labels -->
    <text x="-12" y="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">60</text>
    <text x="-12" y="270" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">0</text>

    <!-- 25 threshold (trend exists) -->
    <line x1="0" y1="160" x2="460" y2="160" stroke="#4FCBA8" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.65"/>
    <text x="466" y="164" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4FCBA8" opacity="0.9">25</text>

    <!-- DI− (green, weakening) -->
    <path d="M 10 130 L 50 145 L 90 158 L 130 172 L 170 188 L 210 200 L 250 215 L 290 225 L 330 232 L 370 240 L 410 245 L 450 250"
          fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <!-- DI+ (red, strengthening, crosses above DI- around index 4) -->
    <path d="M 10 200 L 50 178 L 90 156 L 130 140 L 170 122 L 210 100 L 250 82 L 290 70 L 330 60 L 370 55 L 410 52 L 450 50"
          fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <!-- ADX (orange, rising through 25) -->
    <path d="M 10 220 L 50 215 L 90 200 L 130 178 L 170 158 L 210 138 L 250 118 L 290 100 L 330 85 L 370 75 L 410 68 L 450 65"
          fill="none" stroke="#f59e0b" stroke-width="3"/>

    <!-- DI+/DI− crossover callout -->
    <g filter="url(#glow)">
      <circle cx="130" cy="156" r="9" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>
    <text x="130" y="290" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="600">DI+ crosses above DI−</text>
    <text x="130" y="307" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">direction flips up</text>

    <!-- ADX above 25 callout -->
    <text x="450" y="40" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4FCBA8" text-anchor="end" font-weight="600">ADX &gt; 25 — strong trend</text>

    <!-- Legend -->
    <g transform="translate(0,360)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#ef4444" stroke-width="2.5"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">DI+</text>
      <line x1="74" y1="-3" x2="94" y2="-3" stroke="#22c55e" stroke-width="2.5"/>
      <text x="100" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">DI−</text>
      <line x1="148" y1="-3" x2="168" y2="-3" stroke="#f59e0b" stroke-width="3"/>
      <text x="174" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">ADX (strength only)</text>
    </g>
  </g>
</svg>
