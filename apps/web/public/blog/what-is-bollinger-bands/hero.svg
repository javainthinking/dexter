<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-bollinger-bands`. Right column shows
  price riding the upper band during a trend, a squeeze (narrow bands)
  before a breakout, and price piercing the lower band.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · VOLATILITY ENVELOPE</text>
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="#F4F4F5" letter-spacing="-1">BOLL</text>
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Bollinger Bands</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">An envelope that breathes with</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">volatility — squeezes before it breaks.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA · BOLL(20, 2)</text>
    <text x="22" y="66" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#F4F4F5">MID   = SMA(close, 20)</text>
    <text x="22" y="90" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#F4F4F5">UPPER = MID + 2σ   LOWER = MID − 2σ</text>
    <text x="22" y="112" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#F4F4F5" opacity="0.65">%B = (close − LOWER) / (UPPER − LOWER) × 100</text>
  </g>

  <!-- Right column: Bollinger Bands visualization -->
  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">PRICE · UPPER · MID · LOWER</text>

    <!-- Channel fill (between upper and lower) -->
    <path d="M 10 60 L 80 80 L 150 95 L 220 158 L 290 168 L 360 145 L 430 110 L 460 95
             L 460 240 L 430 250 L 360 245 L 290 200 L 220 190 L 150 220 L 80 240 L 10 250 Z"
          fill="url(#band)"/>

    <!-- Upper band -->
    <path d="M 10 60 L 80 80 L 150 95 L 220 158 L 290 168 L 360 145 L 430 110 L 460 95"
          fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 3"/>
    <!-- Middle band -->
    <path d="M 10 155 L 80 160 L 150 158 L 220 174 L 290 184 L 360 195 L 430 178 L 460 168"
          fill="none" stroke="#a78bfa" stroke-width="2"/>
    <!-- Lower band -->
    <path d="M 10 250 L 80 240 L 150 220 L 220 190 L 290 200 L 360 245 L 430 250 L 460 240"
          fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 3"/>

    <!-- Price line: rides upper, then squeeze (narrow), then break above upper -->
    <path d="M 10 90 L 50 70 L 80 82 L 110 75 L 150 92 L 180 105 L 220 156 L 250 170 L 290 175 L 320 168 L 360 148 L 400 120 L 430 85 L 460 65"
          fill="none" stroke="#F4F4F5" stroke-width="2.5"/>

    <!-- Squeeze callout -->
    <g filter="url(#glow)">
      <ellipse cx="260" cy="180" rx="55" ry="18" fill="none" stroke="#4FCBA8" stroke-width="2"/>
    </g>
    <text x="260" y="265" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="middle" font-weight="600">Squeeze</text>
    <text x="260" y="282" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">bandwidth contracts → expansion ahead</text>

    <!-- Riding the upper band callout (right side) -->
    <text x="445" y="50" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="end">riding the upper band</text>

    <!-- Legend -->
    <g transform="translate(0,330)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#F4F4F5" stroke-width="2.5"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">price</text>
      <line x1="80" y1="-3" x2="100" y2="-3" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 3"/>
      <text x="106" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">±2σ</text>
      <line x1="148" y1="-3" x2="168" y2="-3" stroke="#a78bfa" stroke-width="2"/>
      <text x="174" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">SMA(20) mid</text>
    </g>
  </g>
</svg>
