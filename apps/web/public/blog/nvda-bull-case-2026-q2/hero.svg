<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nvBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="nvGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#nvBg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">THESIS · Q2 2026</text>

  <text x="60" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="600" fill="#F4F4F5" letter-spacing="-0.5">NVDA bull case</text>
  <text x="60" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="500" fill="#4FCBA8" opacity="0.9">— a framework, refreshed quarterly</text>

  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Four pillars drive 90% of the answer.</text>
  <text x="60" y="358" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Get the data-centre call right and the rest is fine-tuning.</text>

  <!-- 3 bear risks card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="140" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">3 STRUCTURAL BEAR RISKS</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5">
      <text x="22" y="62">1. Hyperscaler insourcing (TPU / Trainium / MTIA)</text>
      <text x="22" y="86">2. Gross-margin compression as competition scales</text>
      <text x="22" y="110">3. Capex digestion if hyperscaler AI revenue lags</text>
      <text x="22" y="134" font-size="13" fill="#F4F4F5" opacity="0.55">— any one at full strength compresses bull 30–50%</text>
    </g>
  </g>

  <!-- Right: 4 pillars with weights -->
  <g transform="translate(680,140)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.55" letter-spacing="2">FOUR BULL-CASE PILLARS</text>

    <!-- Pillar 1: Data-centre TAM (highlighted, largest) -->
    <g transform="translate(0,24)" filter="url(#nvGlow)">
      <rect x="0" y="0" width="490" height="48" rx="8" fill="#4FCBA8"/>
      <text x="14" y="30" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#14120b">Data-centre TAM</text>
      <text x="476" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" font-weight="700" fill="#14120b" text-anchor="end">~70%</text>
    </g>

    <!-- Pillar 2: Software moat -->
    <g transform="translate(0,82)">
      <rect x="0" y="0" width="490" height="40" rx="8" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.55"/>
      <text x="14" y="26" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">Software margin moat (CUDA, NIM)</text>
      <text x="476" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#4FCBA8" text-anchor="end">~15%</text>
    </g>

    <!-- Pillar 3: Networking attach -->
    <g transform="translate(0,132)">
      <rect x="0" y="0" width="490" height="40" rx="8" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.4"/>
      <text x="14" y="26" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">Networking attach (NVLink, IB)</text>
      <text x="476" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#4FCBA8" opacity="0.85" text-anchor="end">~10%</text>
    </g>

    <!-- Pillar 4: Automotive optionality -->
    <g transform="translate(0,182)">
      <rect x="0" y="0" width="490" height="40" rx="8" fill="#1b1913" stroke="#F4F4F5" stroke-opacity="0.25"/>
      <text x="14" y="26" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.85">Automotive + robotics optionality</text>
      <text x="476" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#F4F4F5" opacity="0.6" text-anchor="end">~5%</text>
    </g>

    <text x="0" y="260" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#F4F4F5" opacity="0.5">Illustrative weights — refresh quarterly from latest filings.</text>
  </g>
</svg>
