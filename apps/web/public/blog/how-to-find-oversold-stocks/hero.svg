<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">HOW-TO · SCREENING</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="70" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Oversold Scan</text>

  <text x="60" y="244" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#F4F4F5" opacity="0.85">RSI dashboard + filters = real candidates</text>

  <text x="60" y="288" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Bare RSI &lt; 30 is a coin flip.</text>
  <text x="60" y="314" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Layered scan turns it into edge.</text>

  <g transform="translate(60,360)">
    <rect x="0" y="0" width="580" height="200" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">4 STEPS · 60s</text>

    <text x="22" y="68" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">1.</text>
    <text x="48" y="68" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Open RSI view at /indicators · sort ascending</text>

    <text x="22" y="100" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">2.</text>
    <text x="48" y="100" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Filter: ADX &gt; 25 + price above 200-day SMA</text>

    <text x="22" y="132" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">3.</text>
    <text x="48" y="132" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Wait for RSI exit-from-oversold + confirming break</text>

    <text x="22" y="164" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8">4.</text>
    <text x="48" y="164" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5">Generate ATR-sized entry plan in chat</text>
  </g>

  <g transform="translate(680,150)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">FILTERS CUT THE FALSE POSITIVES</text>

    <!-- Funnel visualization -->
    <g transform="translate(60,0)">
      <!-- Top: raw candidates -->
      <rect x="0" y="0" width="340" height="40" fill="#60a5fa" opacity="0.6"/>
      <text x="170" y="26" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" text-anchor="middle" font-weight="600">RSI &lt; 30  ·  ~30 names</text>

      <!-- Arrow -->
      <text x="170" y="58" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" text-anchor="middle" opacity="0.55">+ ADX &gt; 25</text>

      <!-- Step 2 -->
      <rect x="40" y="68" width="260" height="40" fill="#60a5fa" opacity="0.7"/>
      <text x="170" y="94" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" text-anchor="middle" font-weight="600">+ trend regime  ·  ~12 names</text>

      <text x="170" y="126" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" text-anchor="middle" opacity="0.55">+ above 200-day SMA</text>

      <!-- Step 3 -->
      <rect x="80" y="136" width="180" height="40" fill="#60a5fa" opacity="0.85"/>
      <text x="170" y="162" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" text-anchor="middle" font-weight="600">+ trend confirmed  ·  ~5</text>

      <text x="170" y="194" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" text-anchor="middle" opacity="0.55">+ RSI exit-cross + divergence</text>

      <!-- Step 4 -->
      <rect x="120" y="204" width="100" height="40" fill="#4FCBA8" opacity="0.95"/>
      <text x="170" y="230" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" text-anchor="middle" font-weight="700">~2 actionable</text>
    </g>

    <g transform="translate(0,300)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.55" letter-spacing="2">LAYERED HIT RATE</text>
      <text x="0" y="32" font-family="Georgia, serif" font-size="30" fill="#4FCBA8" font-weight="600">~70%</text>
      <text x="120" y="32" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">vs ~50% bare</text>
      <text x="0" y="56" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.5">filters cut false positives ~60–80%</text>
    </g>
  </g>
</svg>
