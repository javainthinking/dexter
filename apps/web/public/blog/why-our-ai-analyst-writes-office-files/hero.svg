<?xml version="1.0" encoding="UTF-8"?>
<!--
  Build-in-public hero for `why-our-ai-analyst-writes-office-files`.
  Left column: eyebrow + title + tagline. Right column: a system
  diagram — a chat bubble flowing through an OfficeCLI layer into three
  native file outputs (.docx, .pptx, .xlsx).
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">BUILD-IN-PUBLIC · FILE GENERATION</text>

  <text x="60" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="600" fill="#F4F4F5" letter-spacing="-1">Chat → Deliverable</text>

  <text x="60" y="228" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="500" fill="#F4F4F5" opacity="0.85">Why our AI analyst writes Office files</text>

  <text x="60" y="272" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">A chat answer is read once and lost.</text>
  <text x="60" y="298" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">A Word, PPT, or Excel file ships.</text>

  <!-- Claim card -->
  <g transform="translate(60,350)">
    <rect x="0" y="0" width="500" height="210" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">NATIVE OPENXML · NOT A SCREENSHOT</text>

    <text x="22" y="68" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.docx</text>
    <text x="110" y="68" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">memo · sourced claims · tables</text>

    <text x="22" y="104" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.pptx</text>
    <text x="110" y="104" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">deck · embedded charts · editable</text>

    <text x="22" y="140" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.xlsx</text>
    <text x="110" y="140" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F4F4F5" opacity="0.85">workbook · live cross-sheet formulas</text>

    <line x1="22" y1="160" x2="478" y2="160" stroke="#F4F4F5" stroke-opacity="0.1"/>
    <text x="22" y="188" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4FCBA8" font-weight="600">One prompt · three formats · 7-day links</text>
  </g>

  <!-- Right column: chat → OfficeCLI → files -->
  <g transform="translate(640,150)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">THE PIPELINE</text>

    <!-- chat bubble -->
    <g transform="translate(0,10)">
      <rect x="0" y="0" width="200" height="86" rx="12" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.3"/>
      <text x="18" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">CHAT</text>
      <rect x="18" y="42" width="150" height="9" rx="4" fill="#F4F4F5" opacity="0.45"/>
      <rect x="18" y="58" width="110" height="9" rx="4" fill="#F4F4F5" opacity="0.3"/>
      <!-- tail -->
      <polygon points="20,86 36,86 20,102" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.3"/>
    </g>

    <!-- arrow down -->
    <g transform="translate(100,116)">
      <line x1="0" y1="0" x2="0" y2="34" stroke="#4FCBA8" stroke-width="2"/>
      <polygon points="-6,34 6,34 0,46" fill="#4FCBA8"/>
    </g>

    <!-- OfficeCLI layer -->
    <g transform="translate(0,168)">
      <rect x="0" y="0" width="520" height="56" rx="10" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.5"/>
      <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="#4FCBA8">OfficeCLI</text>
      <text x="150" y="34" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">compiles analysis → OpenXML</text>
    </g>

    <!-- three arrows down -->
    <g transform="translate(90,224)"><line x1="0" y1="0" x2="0" y2="28" stroke="#4FCBA8" stroke-width="2"/><polygon points="-5,28 5,28 0,38" fill="#4FCBA8"/></g>
    <g transform="translate(260,224)"><line x1="0" y1="0" x2="0" y2="28" stroke="#4FCBA8" stroke-width="2"/><polygon points="-5,28 5,28 0,38" fill="#4FCBA8"/></g>
    <g transform="translate(430,224)"><line x1="0" y1="0" x2="0" y2="28" stroke="#4FCBA8" stroke-width="2"/><polygon points="-5,28 5,28 0,38" fill="#4FCBA8"/></g>

    <!-- three file outputs -->
    <g transform="translate(0,272)">
      <rect x="0" y="0" width="160" height="96" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <text x="18" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.docx</text>
      <rect x="18" y="44" width="120" height="8" rx="3" fill="#F4F4F5" opacity="0.4"/>
      <rect x="18" y="60" width="120" height="8" rx="3" fill="#F4F4F5" opacity="0.3"/>
      <rect x="18" y="76" width="80" height="8" rx="3" fill="#F4F4F5" opacity="0.3"/>
    </g>
    <g transform="translate(180,272)">
      <rect x="0" y="0" width="160" height="96" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <text x="18" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.pptx</text>
      <rect x="18" y="42" width="124" height="40" rx="4" fill="#14120b" stroke="#4FCBA8" stroke-opacity="0.2"/>
      <polyline points="26,74 50,62 74,66 98,48 122,54" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    </g>
    <g transform="translate(360,272)">
      <rect x="0" y="0" width="160" height="96" rx="8" fill="#2a2820" stroke="#4FCBA8" stroke-opacity="0.25"/>
      <text x="18" y="30" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#4FCBA8">.xlsx</text>
      <line x1="18" y1="48" x2="142" y2="48" stroke="#F4F4F5" stroke-opacity="0.15"/>
      <line x1="18" y1="66" x2="142" y2="66" stroke="#F4F4F5" stroke-opacity="0.15"/>
      <line x1="60" y1="40" x2="60" y2="84" stroke="#F4F4F5" stroke-opacity="0.15"/>
      <line x1="102" y1="40" x2="102" y2="84" stroke="#F4F4F5" stroke-opacity="0.15"/>
      <rect x="104" y="52" width="36" height="12" fill="#4FCBA8" opacity="0.3"/>
    </g>
  </g>
</svg>
