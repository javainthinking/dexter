<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-rsi`. Right column shows the RSI
  oscillator on a 0–100 scale with the 70 / 30 reference lines and a
  bullish divergence — price (top, dashed) makes a lower low while RSI
  (bottom, solid) makes a higher low.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · OSCILLATOR</text>
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">RSI</text>
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Relative Strength Index</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Bounded 0–100. Catches mean</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">reversion — lies in strong trends.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="70" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#F4F4F5">RSI = 100 − 100 / (1 + RS)</text>
    <text x="22" y="100" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5" opacity="0.7">RS = avg_gain(14) / avg_loss(14)</text>
  </g>

  <!-- Right column: price + RSI two-pane -->
  <g transform="translate(680,150)">
    <text x="0" y="-20" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">BULLISH DIVERGENCE</text>

    <!-- Top: price line (dashed, descending lows) -->
    <text x="-12" y="20" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">price</text>
    <path d="M 10 30 L 50 60 L 90 50 L 130 95 L 170 80 L 210 120 L 250 100 L 290 145 L 330 130 L 370 170 L 410 155 L 450 175"
          fill="none" stroke="#F4F4F5" stroke-width="2" stroke-dasharray="3 3" opacity="0.85"/>
    <!-- price lower-low markers -->
    <circle cx="210" cy="120" r="4" fill="#ef4444"/>
    <circle cx="370" cy="170" r="4" fill="#ef4444"/>
    <line x1="210" y1="120" x2="370" y2="170" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>
    <text x="290" y="200" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">lower low</text>

    <!-- Divider -->
    <line x1="0" y1="220" x2="460" y2="220" stroke="#F4F4F5" stroke-opacity="0.12"/>

    <!-- Bottom: RSI pane -->
    <text x="-12" y="245" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">RSI</text>

    <!-- 70 line -->
    <line x1="0" y1="252" x2="460" y2="252" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>
    <text x="462" y="255" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#ef4444" opacity="0.75">70</text>
    <!-- 50 mid -->
    <line x1="0" y1="290" x2="460" y2="290" stroke="#F4F4F5" stroke-width="1" stroke-dasharray="2 2" opacity="0.2"/>
    <text x="462" y="293" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.4">50</text>
    <!-- 30 line -->
    <line x1="0" y1="328" x2="460" y2="328" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>
    <text x="462" y="331" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#22c55e" opacity="0.75">30</text>

    <!-- RSI line: makes HIGHER low while price makes lower low (divergence) -->
    <path d="M 10 270 L 50 285 L 90 280 L 130 305 L 170 295 L 210 322 L 250 312 L 290 320 L 330 315 L 370 312 L 410 308 L 450 305"
          fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    <!-- RSI higher-low markers -->
    <circle cx="210" cy="322" r="4" fill="#22c55e"/>
    <circle cx="370" cy="312" r="4" fill="#22c55e"/>
    <line x1="210" y1="322" x2="370" y2="312" stroke="#22c55e" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>
    <text x="290" y="356" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">higher low → bullish divergence</text>
  </g>
</svg>
