<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · VOLATILITY</text>

  <text x="60" y="220" font-family="Georgia, serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">ATR</text>

  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Average True Range</text>

  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">The volatility number that</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">sizes positions and sets stops.</text>

  <g transform="translate(60,400)">
    <rect x="0" y="0" width="580" height="155" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULAS</text>
    <text x="22" y="62" font-family="ui-monospace, monospace" font-size="14" fill="#F4F4F5">TR = max(H − L, |H − PrevClose|, |L − PrevClose|)</text>
    <text x="22" y="86" font-family="ui-monospace, monospace" font-size="14" fill="#F4F4F5">ATR[t] = (ATR[t-1] × (N−1) + TR[t]) / N</text>
    <text x="22" y="116" font-family="ui-monospace, monospace" font-size="15" fill="#F4F4F5">Stop = Entry − (2 × ATR)</text>
    <text x="22" y="140" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#F4F4F5" opacity="0.55">Default N = 14 · 2× ATR is the swing-trade standard</text>
  </g>

  <g transform="translate(680,170)">
    <text x="0" y="-22" font-family="ui-monospace, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">ATR-BASED STOP SIZING</text>

    <!-- KO (low ATR) -->
    <g transform="translate(0,20)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#4FCBA8" font-weight="600">KO · $60 · ATR $0.45 · 0.75%</text>
      <rect x="0" y="14" width="60" height="20" fill="#4FCBA8" opacity="0.85"/>
      <text x="70" y="29" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">2× ATR stop = $0.90 (1.5%)</text>
    </g>

    <!-- AAPL (moderate) -->
    <g transform="translate(0,60)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#60a5fa" font-weight="600">AAPL · $180 · ATR $2.40 · 1.3%</text>
      <rect x="0" y="14" width="135" height="20" fill="#60a5fa" opacity="0.85"/>
      <text x="145" y="29" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">2× ATR stop = $4.80 (2.7%)</text>
    </g>

    <!-- PLTR (growth, higher) -->
    <g transform="translate(0,100)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#f59e0b" font-weight="600">PLTR · $35 · ATR $1.20 · 3.4%</text>
      <rect x="0" y="14" width="240" height="20" fill="#f59e0b" opacity="0.85"/>
      <text x="250" y="29" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">2× ATR stop = $2.40 (6.9%)</text>
    </g>

    <!-- Small cap (highest) -->
    <g transform="translate(0,140)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#ef4444" font-weight="600">SMALL-CAP · $25 · ATR $1.30 · 5.2%</text>
      <rect x="0" y="14" width="380" height="20" fill="#ef4444" opacity="0.85"/>
      <text x="390" y="29" font-family="ui-monospace, monospace" font-size="11" fill="#F4F4F5" opacity="0.85">2× ATR = $2.60 (10.4%)</text>
    </g>

    <g transform="translate(0,210)">
      <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">Same 1% portfolio risk · smaller position</text>
      <text x="0" y="20" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.8">in the high-ATR stock. Sizing respects volatility.</text>
    </g>

    <g transform="translate(0,290)">
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="12" fill="#F4F4F5" opacity="0.55" letter-spacing="2">RULE OF THUMB</text>
      <text x="0" y="32" font-family="Georgia, serif" font-size="30" fill="#4FCBA8" font-weight="600">2× ATR</text>
      <text x="100" y="32" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.7">initial stop · 1% portfolio risk</text>
    </g>
  </g>
</svg>
