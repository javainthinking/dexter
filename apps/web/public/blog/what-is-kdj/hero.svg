<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-kdj`. Right column shows K/D/J three
  lines on a 0–100 scale with 20/80 thresholds, J line extending below
  0 at the left edge (the canonical "J翻红 bottoms out") and a golden
  cross in the oversold zone highlighted.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · A-SHARE OSCILLATOR</text>
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">KDJ</text>
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Stochastic, the A-share way</text>
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Three lines: smooth, smoother,</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">amplified. J extends past the rails.</text>

  <!-- Formula card -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="540" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA · KDJ(9,3,3)</text>
    <text x="22" y="64" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5">RSV = (close − low9) / (high9 − low9) × 100</text>
    <text x="22" y="88" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5">K = (2·prevK + RSV)/3   D = (2·prevD + K)/3</text>
    <text x="22" y="110" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F4F4F5" opacity="0.85">J = 3K − 2D  ←  amplifies extremes</text>
  </g>

  <!-- Right column: KDJ chart -->
  <g transform="translate(680,160)">
    <text x="0" y="-22" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.55" letter-spacing="2">KDJ · OVERSOLD ZONE GOLDEN CROSS</text>

    <!-- Y axis labels -->
    <text x="-12" y="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">100</text>
    <text x="-12" y="270" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#F4F4F5" opacity="0.5" text-anchor="end">0</text>

    <!-- 80 (overbought) -->
    <line x1="0" y1="56" x2="460" y2="56" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>
    <text x="462" y="59" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#ef4444" opacity="0.75">80</text>
    <!-- 50 mid -->
    <line x1="0" y1="140" x2="460" y2="140" stroke="#F4F4F5" stroke-width="1" stroke-dasharray="2 2" opacity="0.18"/>
    <!-- 20 (oversold) -->
    <line x1="0" y1="220" x2="460" y2="220" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>
    <text x="462" y="223" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#22c55e" opacity="0.75">20</text>

    <!-- D line (smoothed, orange) -->
    <path d="M 10 80 L 50 110 L 90 145 L 130 180 L 170 215 L 210 232 L 250 220 L 290 188 L 330 150 L 370 120 L 410 95 L 450 80"
          fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- K line (responsive, blue) — crosses below D then back up through oversold zone -->
    <path d="M 10 70 L 50 105 L 90 152 L 130 195 L 170 232 L 210 248 L 250 220 L 290 175 L 330 130 L 370 95 L 410 70 L 450 55"
          fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <!-- J line (amplified, purple) — extends below 0 at trough -->
    <path d="M 10 55 L 50 95 L 90 160 L 130 220 L 170 268 L 210 282 L 250 235 L 290 165 L 330 95 L 370 50 L 410 18 L 450 -4"
          fill="none" stroke="#a78bfa" stroke-width="2"/>

    <!-- Golden cross callout in oversold zone -->
    <g filter="url(#glow)">
      <circle cx="232" cy="240" r="10" fill="none" stroke="#4FCBA8" stroke-width="2.5"/>
    </g>
    <text x="232" y="300" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4FCBA8" text-anchor="middle" font-weight="600">Golden cross</text>
    <text x="232" y="318" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55" text-anchor="middle">in oversold zone — A-share buy</text>

    <!-- Legend -->
    <g transform="translate(0,360)">
      <line x1="0" y1="-3" x2="20" y2="-3" stroke="#60a5fa" stroke-width="2.5"/>
      <text x="26" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">K</text>
      <line x1="58" y1="-3" x2="78" y2="-3" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="84" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">D</text>
      <line x1="116" y1="-3" x2="136" y2="-3" stroke="#a78bfa" stroke-width="2"/>
      <text x="142" y="1" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#F4F4F5" opacity="0.85">J  (can exceed 0..100)</text>
    </g>
  </g>
</svg>
