<?xml version="1.0" encoding="UTF-8"?>
<!--
  Infographic hero for `what-is-dcf`. Goal: a reader should grasp the
  DCF mental model from the image alone. Left column carries the title
  and the formula; right column visualises the timeline of projected
  cash flows being discounted back to present value, with a clearly
  highlighted Terminal Value bar. Fonts use OS-standard families so
  sharp/librsvg rasterisation is reliable.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dcfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="dcfArrow" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4FCBA8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4FCBA8" stop-opacity="0"/>
    </linearGradient>
    <filter id="dcfGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#dcfBg)"/>

  <!-- Section eyebrow -->
  <text x="60" y="92" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">EXPLAINER · VALUATION 101</text>

  <!-- Title -->
  <text x="60" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="600" fill="#F4F4F5" letter-spacing="-1">DCF</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#F4F4F5" opacity="0.85">Discounted Cash Flow</text>

  <!-- Tagline -->
  <text x="60" y="306" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">Sum tomorrow's cash —</text>
  <text x="60" y="332" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#F4F4F5" opacity="0.55">priced in today's dollars.</text>

  <!-- Formula card (bottom-left) -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="520" height="120" rx="14" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.28"/>
    <text x="22" y="34" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4FCBA8" letter-spacing="2" opacity="0.9">FORMULA</text>
    <text x="22" y="76" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">EV = Σ FCF<tspan font-size="14" dy="6">t</tspan><tspan dy="-6"> / (1 + WACC)</tspan><tspan font-size="14" dy="-8">t</tspan></text>
    <text x="80" y="104" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#F4F4F5">+  TV / (1 + WACC)<tspan font-size="14" dy="-8">n</tspan></text>
  </g>

  <!-- Right column: cash flow timeline -->
  <g transform="translate(680,160)">
    <!-- Baseline -->
    <line x1="-10" y1="290" x2="490" y2="290" stroke="#F4F4F5" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Year bars -->
    <rect x="0"   y="220" width="44" height="70"  rx="4" fill="#4FCBA8" opacity="0.32"/>
    <text x="22"  y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.7" text-anchor="middle">Y1</text>

    <rect x="70"  y="200" width="44" height="90"  rx="4" fill="#4FCBA8" opacity="0.42"/>
    <text x="92"  y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.7" text-anchor="middle">Y2</text>

    <rect x="140" y="180" width="44" height="110" rx="4" fill="#4FCBA8" opacity="0.52"/>
    <text x="162" y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.7" text-anchor="middle">Y3</text>

    <rect x="210" y="160" width="44" height="130" rx="4" fill="#4FCBA8" opacity="0.62"/>
    <text x="232" y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.7" text-anchor="middle">Y4</text>

    <rect x="280" y="135" width="44" height="155" rx="4" fill="#4FCBA8" opacity="0.74"/>
    <text x="302" y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#F4F4F5" opacity="0.7" text-anchor="middle">Y5</text>

    <!-- Terminal Value (highlighted, larger) -->
    <g filter="url(#dcfGlow)">
      <rect x="380" y="80" width="64" height="210" rx="6" fill="#4FCBA8"/>
    </g>
    <text x="412" y="316" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#4FCBA8" text-anchor="middle">TV</text>

    <!-- TV proportion annotation -->
    <line x1="456" y1="85" x2="456" y2="135" stroke="#4FCBA8" stroke-opacity="0.45"/>
    <text x="468" y="103" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4FCBA8" opacity="0.9">60–80%</text>
    <text x="468" y="122" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4FCBA8" opacity="0.9">of EV</text>

    <!-- Time axis label -->
    <text x="220" y="356" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#F4F4F5" opacity="0.5" text-anchor="middle">Time →</text>

    <!-- Discount curve: from TV back to PV anchor on the left -->
    <path d="M 410 70 Q 200 -40 -10 230" stroke="url(#dcfArrow)" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>
    <!-- Arrowhead at left end -->
    <polygon points="-10,230 4,222 4,238" fill="#4FCBA8" opacity="0.75"/>
    <!-- Discount label -->
    <text x="60" y="40" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4FCBA8" opacity="0.85">discount</text>
    <text x="60" y="60" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4FCBA8" opacity="0.85">back to PV →</text>
  </g>
</svg>
