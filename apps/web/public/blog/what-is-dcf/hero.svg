<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder hero for `what-is-dcf` — brand-aligned SVG so the
  blog ships without external image assets while the GPT Image 2
  workflow is set up. Replace with the rendered PNG produced from
  apps/web/content/blog/what-is-dcf/_image-prompt.md when ready.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FCBA8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4FCBA8" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#4FCBA8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4FCBA8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Cash-flow timeline: five tapered bars getting larger, with a
       discount arc curving back to t=0 -->
  <g transform="translate(180,180)" filter="url(#glow)">
    <rect x="0"   y="180" width="60" height="80"  rx="6" fill="#4FCBA8" opacity="0.35"/>
    <rect x="120" y="160" width="60" height="100" rx="6" fill="#4FCBA8" opacity="0.45"/>
    <rect x="240" y="135" width="60" height="125" rx="6" fill="#4FCBA8" opacity="0.55"/>
    <rect x="360" y="105" width="60" height="155" rx="6" fill="#4FCBA8" opacity="0.7"/>
    <rect x="480" y="70"  width="60" height="190" rx="6" fill="#4FCBA8" opacity="0.85"/>
    <!-- terminal value -->
    <rect x="600" y="20"  width="80" height="240" rx="8" fill="#4FCBA8"/>
    <!-- discount arc -->
    <path d="M 680 50 Q 400 -90 30 200" stroke="url(#line)" stroke-width="2.5" fill="none" stroke-dasharray="6 6"/>
    <!-- baseline -->
    <line x1="0" y1="280" x2="700" y2="280" stroke="#4FCBA8" stroke-opacity="0.25" stroke-width="1"/>
    <!-- t labels -->
    <g fill="#F4F4F5" opacity="0.5" font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
      <text x="30"  y="310">t=1</text>
      <text x="150" y="310">t=2</text>
      <text x="270" y="310">t=3</text>
      <text x="390" y="310">t=4</text>
      <text x="510" y="310">t=5</text>
      <text x="640" y="310">TV</text>
    </g>
  </g>
  <!-- corner mark -->
  <g transform="translate(60,60)" font-family="ui-monospace, monospace" fill="#F4F4F5" opacity="0.4" font-size="12" letter-spacing="2">
    <text>PICKSKILL · EXPLAINER</text>
  </g>
</svg>
