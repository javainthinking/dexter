<?xml version="1.0" encoding="UTF-8"?>
<!-- Product mockup: the PPT / Word / Excel output stack generated from a prompt. -->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#1b1913"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="60" y="84" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#4FCBA8" letter-spacing="3" opacity="0.85">RESEARCH DOCUMENTS</text>
  <text x="60" y="140" font-family="Georgia, serif" font-size="46" font-weight="600" fill="#F4F4F5">From a prompt to a deck.</text>
  <text x="60" y="174" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#F4F4F5" opacity="0.6">Native .pptx · .docx · .xlsx — sourced from live data, editable on download</text>

  <!-- Prompt chip -->
  <g transform="translate(60,210)">
    <rect x="0" y="0" width="430" height="70" rx="12" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.4"/>
    <text x="18" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#4FCBA8" letter-spacing="2">PROMPT</text>
    <text x="18" y="50" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5">“Build a 12-slide investor deck on TSMC.”</text>
  </g>
  <!-- arrow -->
  <g transform="translate(508,235)">
    <line x1="0" y1="10" x2="44" y2="10" stroke="#4FCBA8" stroke-width="2"/>
    <polygon points="44,4 56,10 44,16" fill="#4FCBA8"/>
  </g>

  <!-- Document stack: Excel (back), Word (mid), PPT (front) -->
  <!-- Excel (back-right) -->
  <g transform="translate(800,250) rotate(4)">
    <rect x="0" y="0" width="300" height="320" rx="10" fill="#14120b" stroke="#22c55e" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="300" height="30" rx="10" fill="#22c55e" opacity="0.18"/>
    <text x="16" y="20" font-family="ui-monospace, monospace" font-size="12" fill="#22c55e" font-weight="700">model.xlsx</text>
    <!-- grid -->
    <g stroke="#F4F4F5" stroke-opacity="0.08">
      <line x1="0" y1="64" x2="300" y2="64"/><line x1="0" y1="94" x2="300" y2="94"/><line x1="0" y1="124" x2="300" y2="124"/><line x1="0" y1="154" x2="300" y2="154"/><line x1="0" y1="184" x2="300" y2="184"/><line x1="0" y1="214" x2="300" y2="214"/>
      <line x1="80" y1="40" x2="80" y2="300"/><line x1="160" y1="40" x2="160" y2="300"/><line x1="240" y1="40" x2="240" y2="300"/>
    </g>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#F4F4F5" opacity="0.6">
      <text x="12" y="58">Year</text><text x="92" y="58">Rev</text><text x="172" y="58">FCF</text><text x="252" y="58">DCF</text>
      <text x="12" y="88">Y1</text><text x="92" y="88">88B</text><text x="172" y="88">32B</text><text x="252" y="88" fill="#22c55e">+</text>
      <text x="12" y="118">Y2</text><text x="92" y="118">104B</text><text x="172" y="118">41B</text><text x="252" y="118" fill="#22c55e">+</text>
      <text x="12" y="148">Y3</text><text x="92" y="148">119B</text><text x="172" y="148">52B</text><text x="252" y="148" fill="#22c55e">+</text>
    </g>
  </g>

  <!-- Word (mid) -->
  <g transform="translate(560,235) rotate(-3)">
    <rect x="0" y="0" width="280" height="330" rx="10" fill="#1b1913" stroke="#60a5fa" stroke-opacity="0.55"/>
    <rect x="0" y="0" width="280" height="30" rx="10" fill="#60a5fa" opacity="0.18"/>
    <text x="16" y="20" font-family="ui-monospace, monospace" font-size="12" fill="#60a5fa" font-weight="700">report.docx</text>
    <rect x="22" y="56" width="150" height="14" rx="3" fill="#F4F4F5" opacity="0.6"/>
    <rect x="22" y="86" width="236" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="100" width="236" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="114" width="200" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="140" width="110" height="11" rx="3" fill="#F4F4F5" opacity="0.45"/>
    <rect x="22" y="164" width="236" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="178" width="236" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="192" width="170" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="220" width="236" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
    <rect x="22" y="234" width="190" height="7" rx="3" fill="#F4F4F5" opacity="0.22"/>
  </g>

  <!-- PPT (front) -->
  <g transform="translate(330,260)">
    <rect x="0" y="0" width="300" height="300" rx="10" fill="#1b1913" stroke="#4FCBA8" stroke-opacity="0.7"/>
    <rect x="0" y="0" width="300" height="30" rx="10" fill="#4FCBA8" opacity="0.2"/>
    <text x="16" y="20" font-family="ui-monospace, monospace" font-size="12" fill="#4FCBA8" font-weight="700">deck.pptx · slide 5</text>
    <text x="18" y="62" font-family="Georgia, serif" font-size="16" fill="#F4F4F5" font-weight="600">Valuation — DCF</text>
    <!-- mini bar chart -->
    <g transform="translate(18,86)">
      <rect x="0" y="120" width="34" height="40" fill="#4FCBA8" opacity="0.85"/>
      <rect x="48" y="92" width="34" height="68" fill="#4FCBA8" opacity="0.85"/>
      <rect x="96" y="64" width="34" height="96" fill="#4FCBA8" opacity="0.9"/>
      <rect x="144" y="40" width="34" height="120" fill="#4FCBA8" opacity="0.95"/>
      <rect x="192" y="20" width="34" height="140" fill="#4FCBA8"/>
      <line x1="0" y1="160" x2="262" y2="160" stroke="#F4F4F5" stroke-opacity="0.2"/>
    </g>
    <text x="18" y="280" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#F4F4F5" opacity="0.55">Implied $245 · 35% upside</text>
  </g>

  <!-- download note -->
  <text x="60" y="600" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#F4F4F5" opacity="0.6">Delivered as a 7-day download link · editable in PowerPoint, Word, Excel, Keynote, Google Workspace</text>
</svg>
